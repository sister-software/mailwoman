approvedGitRepositories:
  - "**"

compressionLevel: mixed

enableGlobalCache: false

enableScripts: true

nodeLinker: node-modules

npmMinimalAgeGate: 0

packageExtensions:
  tr46@*:
    dependencies:
      punycode: ^2.3.1

supportedArchitectures:
  cpu:
    - current
    - x86
    - x64
    - arm64
  os:
    - current
    - darwin
    - linux

yarnPath: .yarn/releases/yarn-4.17.0.cjs
