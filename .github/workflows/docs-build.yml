# Build + deploy the Docusaurus docs site.
#
# On pull_request: the build job runs on EVERY PR (so it can be a required status check), but the
# structure gate + build steps execute only when a demo-affecting path changed — otherwise the job
# reports green in seconds. Catches broken links, MDX parse errors, and — before any install —
# frontmatter/duplicate-title/orphan regressions via docs/scripts/check-docs-structure.ts.
# On push to main: same steps (path-filtered at the trigger), then deploy to GitHub Pages.
#
# Binary assets (model.onnx, tokenizer.model, fst-en-US.bin, wof-hot.db) are
# fetched at runtime from the HF Bucket (sister-software/mailwoman), NOT bundled
# into the static site. The demo-assets plugin still runs loadContent() to
# validate the model card, but binary staging is skipped in CI because the
# neural-weights-en-us package has no model files without link-dev-weights.ts.
name: Docs

on:
  # The demo BUNDLES these workspaces (neural-web pulls in the resolver), so a change to the
  # resolver must rebuild + redeploy the demo — otherwise a merged resolver fix sits on main while
  # the live demo serves the old bundle (which is exactly how the "New York → West New York" fix
  # almost shipped invisibly). workflow_dispatch is the manual escape hatch when a dependency
  # outside these paths changes.
  #
  # The pull_request trigger deliberately carries NO `paths:` filter, so the `build` job runs and
  # reports a check on EVERY PR — a prerequisite for making it a required status check in the
  # branch ruleset. A workflow-level `paths:` filter would leave PRs that touch none of these paths
  # with no check reported at all, which a required-check rule reads as "waiting forever" and the
  # PR can never merge. Instead the heavy steps are gated per-job below on a change-detection step;
  # an unaffected PR reports green in seconds. The `push` trigger keeps its `paths:` filter — deploy
  # should only fire when the built output can actually change.
  workflow_dispatch: {}
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "neural-web/**"
      # the docs webpack alias compiles neural/*.ts source inline (traceParse on /trace)
      - "neural/**"
      - "resolver-wof-wasm/**"
      - "resolver-wof-sqlite/**"
      - "resolver/**"
      - "core/**"
      - "spatial/**"
      - "codex/**"
      - "*.md"

permissions:
  contents: read
  pull-requests: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # Change detection replaces the trigger-level `paths:` filter (see the `on:` comment). On a
      # pull_request, this computes whether any demo-affecting path changed; the heavy steps below
      # run only when it did. On push/workflow_dispatch the filter is skipped and the steps run
      # unconditionally (the push trigger already path-filtered the event, and dispatch is manual).
      # This keeps the job — and therefore its status check — reported on EVERY PR.
      - name: Detect demo-affecting changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - "docs/**"
              - "neural-web/**"
              # the docs webpack alias compiles neural/*.ts source inline (traceParse on /trace)
              - "neural/**"
              - "resolver-wof-wasm/**"
              - "resolver-wof-sqlite/**"
              - "resolver/**"
              - "core/**"
              - "spatial/**"
              - "codex/**"
              - "*.md"

      - name: Setup Node
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs == 'true'
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn

      # Fast structural gate (docs-architecture cleanup, Phase 4): frontmatter vocabulary +
      # required fields, exact duplicate titles, orphan pages. Static parse over node built-ins
      # only — no install, no build — so a structural regression fails in seconds instead of
      # after the full Docusaurus build. Policy: docs/articles/contributing-docs.mdx.
      # (--disable-warning: sidebars.ts is format-ambiguous — the docs workspace can't carry
      # type:module without breaking the Docusaurus SSR bundle; see docs/scripts/package.json.)
      - name: Docs structure checks
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs == 'true'
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON docs/scripts/check-docs-structure.ts

      - name: Enable Corepack (yarn 4)
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs == 'true'
        run: corepack enable

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs == 'true'
        run: yarn install --immutable

      - name: Compile workspaces
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs == 'true'
        run: yarn compile

      - name: Build docs
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs == 'true'
        run: yarn workspace @mailwoman/docs build

      - name: Upload Pages artifact
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/build

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
