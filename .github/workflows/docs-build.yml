# Build + deploy the Docusaurus docs site.
#
# On pull_request: build-only (catches broken links, MDX parse errors).
# On push to main: build + deploy to GitHub Pages.
#
# Binary assets (model.onnx, tokenizer.model, fst-en-US.bin, wof-hot.db) are
# fetched at runtime from the HF Bucket (sister-software/mailwoman), NOT bundled
# into the static site. The demo-assets plugin still runs loadContent() to
# validate the model card, but binary staging is skipped in CI because the
# neural-weights-en-us package has no model files without link-dev-weights.sh.
name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Compile workspaces
        run: yarn compile

      - name: Build docs
        run: cd docs && npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
