# Run the test suite on PRs and pushes to main.
#
# What this catches: workspace breakage that local-only flows missed, such
# as the 2.0.0 release where `workspace:*` deps shipped to npm. A green
# test.yml is required before any PR can merge once branch protection is on.
#
# workflow_dispatch exists for the PR-based release flow (publish.yml mode=prepare): PRs created
# with GITHUB_TOKEN never trigger `on: pull_request` (GitHub's anti-recursion rule), so the
# prepare job dispatches this workflow against the release branch explicitly — the `test` check
# run lands on the branch head SHA, which is what the "Production Integrity" ruleset's required
# status check matches on, letting the release PR auto-merge.
name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt into Node 24 for JavaScript-based actions (checkout, setup-node, etc.)
  # ahead of the forced switch in June 2026 / removal in Sep 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on:
      - self-hosted
      - ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Compile
        run: yarn compile

      # Type-check the toolshed. `scripts/` is in no build project (compile = `tsc -b` over the
      # workspaces only), so it was the one untyped corner where drift accumulated. This leaf
      # project (scripts/tsconfig.json, noEmit) keeps it honest. Runs after Compile so the
      # workspace .d.ts under each `out/` exist for `@mailwoman/*` resolution.
      - name: Typecheck scripts
        run: yarn typecheck:scripts

      # lint:python runs ruff via uvx — the runner image doesn't ship uv (bit 9ce83b40's push:
      # "command not found: uvx", exit 127).
      - name: Setup uv (ruff for lint:python)
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned to the lab host's uv (keep in lockstep — bump deliberately, not via "latest";
          # silences setup-uv's could-not-determine-version fallback warning).
          version: "0.11.16"

      # Full repo-wide lint (oxlint incl. sister-software/no-process-globals, oxfmt --check, python
      # toolchain checks). This is THE complete gate: the pre-commit hook only lints STAGED files,
      # so repo-wide drift and --no-verify commits are caught here.
      - name: Lint
        run: yarn lint

      # The docs app ships real runtime code (the /demo page). Its typecheck sat outside CI and
      # went 7-errors red on main unnoticed — one of those errors was the LIVE demo's undefined
      # baseUrl paths (#917, broken in production since v5.0.0). This step is that bug's class fix.
      - name: Typecheck docs
        run: yarn workspace @mailwoman/docs typecheck

      - name: Test
        run: yarn ci:test

      # @mailwoman/react's suites are Vitest browser mode (playwright/chromium) and are excluded
      # from the root sweep above — importing vitest/browser under the forks pool is a hard error
      # (the failure class that turned Test red from #1215 until this step existed). This leg is
      # their only CI coverage; if it's removed, the react package ships untested.
      - name: Install Playwright chromium (react browser tests)
        run: yarn workspace @mailwoman/react exec playwright install --with-deps chromium

      - name: Test react (browser mode)
        run: yarn workspace @mailwoman/react test:browser

      # Packs every published workspace + installs the tarballs into a throwaway project (no monorepo
      # hoisting) + runs the compiled CLI. Catches the class of bug that shipped in v4.8.0: an
      # undeclared runtime dep, an unshipped file, or a command module with an eager top-level side
      # effect — all invisible in-repo, all fatal to a fresh `npm install`.
      - name: Clean-install smoke test
        run: yarn ci:smoke
