# Run the test suite on PRs and pushes to main.
#
# What this catches: workspace breakage that local-only flows missed, such
# as the 2.0.0 release where `workspace:*` deps shipped to npm. A green
# test.yml is required before any PR can merge once branch protection is on.
name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Opt into Node 24 for JavaScript-based actions (checkout, setup-node, etc.)
  # ahead of the forced switch in June 2026 / removal in Sep 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Compile
        run: yarn compile

      # Type-check the toolshed. `scripts/` is in no build project (compile = `tsc -b` over the
      # workspaces only), so it was the one untyped corner where drift accumulated. This leaf
      # project (scripts/tsconfig.json, noEmit) keeps it honest. Runs after Compile so the
      # workspace .d.ts under each `out/` exist for `@mailwoman/*` resolution.
      - name: Typecheck scripts
        run: yarn typecheck:scripts

      # The zero-raw-access gate lives in oxlint (sister-software/no-process-globals) — cheap CI backstop
      # for commits that skipped the pre-commit hook.
      - name: Lint
        run: yarn lint:oxlint

      # The docs app ships real runtime code (the /demo page). Its typecheck sat outside CI and
      # went 7-errors red on main unnoticed — one of those errors was the LIVE demo's undefined
      # baseUrl paths (#917, broken in production since v5.0.0). This step is that bug's class fix.
      - name: Typecheck docs
        run: yarn workspace @mailwoman/docs typecheck

      - name: Test
        run: yarn ci:test

      # Packs every published workspace + installs the tarballs into a throwaway project (no monorepo
      # hoisting) + runs the compiled CLI. Catches the class of bug that shipped in v4.8.0: an
      # undeclared runtime dep, an unshipped file, or a command module with an eager top-level side
      # effect — all invisible in-repo, all fatal to a fresh `npm install`.
      - name: Clean-install smoke test
        run: yarn ci:smoke
