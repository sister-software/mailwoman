# Manual-dispatch publish workflow with npm Trusted Publishing — PR-BASED, two-phase.
#
# WHY TWO PHASES (2026-07-23): the "Production Integrity" ruleset on `main` requires every change
# to arrive via a PR with a green `test` check — which rejects the old release-it direct push
# (GH013; see the night-2 postmortem, docs/articles/evals/2026-07-23-night-2-postmortem.md). The
# release therefore splits at the merge boundary:
#
#   PHASE 1 — mode=prepare (dispatch with a version): bump every workspace manifest on a
#   `release/v<version>` branch (scripts/prepare-release-version.ts — no git side effects of its
#   own), open the release PR, dispatch the Test workflow against the branch (required because
#   GITHUB_TOKEN-created PRs never trigger `on: pull_request` workflows — GitHub's anti-recursion
#   rule), and enable auto-merge. The PR merges itself the moment `test` goes green; no human click
#   is required, so a solo night shift can still release end-to-end.
#
#   PHASE 2 — mode=publish (dispatch AFTER the release PR has merged): tag the merged commit,
#   create the GitHub release, fetch the weight binaries from Hugging Face, and publish every
#   workspace via OIDC. Idempotent by construction (--tolerate-republish; tag/release creation
#   skipped when they already exist), so re-dispatching after a partial failure is always safe —
#   this same mode IS the recovery path (the old publish_only input).
#
# Auth: npm Trusted Publishing (OIDC). No NPM_TOKEN secret needed in this workflow — npmjs.com is
# configured to accept publishes from this exact workflow file (path:
# .github/workflows/publish.yml). The `id-token: write` permission on the publish job is what lets
# GitHub Actions mint the OIDC token npm verifies against.
#
# Publishes ALL packages — code AND the neural-weights-* — entirely from CI via OIDC, so no npm
# credentials live anywhere. The weights workspaces ship real model.onnx + tokenizer.model
# binaries; the "Fetch weight binaries from Hugging Face" step pulls them from the PUBLIC HF bucket
# (the same files the demo loads, no auth) before publish. Prerequisite for a real publish run: the
# model for the card version must already be staged on HF — push it with `mailwoman release hf`
# (HF token, run on the operator's host) first.
#
# A `clients` job runs after `publish` succeeds: it regenerates the Python + Rust API clients as
# workflow artifacts — inspection copies only. This workflow NEVER publishes clients: registry
# publishing lives in publish-python.yml (PyPI Trusted Publishing) and publish-cargo.yml,
# dispatched separately by the operator. See RELEASING.md "Client packages".
name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "prepare = bump versions + open the auto-merging release PR. publish = tag + npm-publish the ALREADY-MERGED release commit on main (also the partial-failure recovery path)."
        required: true
        default: prepare
        type: choice
        options:
          - prepare
          - publish
      version:
        description: "prepare only: version bump (patch / minor / major / specific semver like 2.1.0)"
        required: false
        default: patch
        type: string
      dry_run:
        description: "Dry run — show what would happen, don't push/publish anything"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  # Opt into Node 24 for JavaScript-based actions (checkout, setup-node, etc.)
  # ahead of the forced switch in June 2026 / removal in Sep 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Serialize publish runs. Don't cancel an in-flight run — a prepare may be mid-push and a publish
# may be mid-tarball; killing either leaves a partial state a human then has to unwind.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # PHASE 1 — version bump on a release branch + auto-merging PR. No npm, no tags, no HF.
  prepare:
    if: ${{ inputs.mode == 'prepare' }}
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 15
    permissions:
      contents: write # push the release/v<version> branch
      pull-requests: write # open the release PR + enable auto-merge
      actions: write # dispatch the Test workflow against the release branch
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # Fail fast if the SHIPPED MODEL's metadata hasn't propagated to the human-facing surfaces
      # (ledger / releases.mdx / status.mdx — the 6.4.0 gap). Keys off the MODEL version in
      # neural-weights-en-us/model-card.json, so a code-only release passes cleanly. Runs on dry
      # runs too — the dry run is the operator's last look before the real dispatch.
      - name: Verify release metadata is propagated
        run: node scripts/verify-release-metadata.ts

      - name: Resolve + bump versions
        id: bump
        run: | # shell
          set -euo pipefail
          OUT=$(node scripts/prepare-release-version.ts --version "${{ inputs.version }}")
          echo "${OUT}"
          VERSION=$(echo "${OUT}" | grep -oP '(?<=^RESOLVED_VERSION=).+')
          # Collision guards — the version must be new to both git and npm.
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "::error::tag v${VERSION} already exists — pick a different version"; exit 1
          fi
          if npm view "mailwoman@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::mailwoman@${VERSION} is already on npm — pick a different version"; exit 1
          fi
          yarn oxfmt package.json '**/package.json'
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: "Dry run: show the bump and stop"
        if: ${{ inputs.dry_run }}
        run: | # shell
          echo "Would open release PR for v${{ steps.bump.outputs.version }} with:"
          git diff --stat
          git diff package.json

      - name: Open the auto-merging release PR
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: | # shell
          set -euo pipefail
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add package.json '*/package.json'
          git commit -m "release: v${VERSION}"
          git push -u origin "${BRANCH}"
          PR_URL=$(gh pr create --base main --head "${BRANCH}" \
            --title "release: v${VERSION}" \
            --body "Automated release PR (publish.yml mode=prepare). Version bump across the root + all $(node -p "require('./.release-it.json').plugins['@release-it-plugins/workspaces'].workspaces.length") workspaces. Auto-merges when the required \`test\` check passes; then dispatch \`publish.yml\` with mode=publish to tag + npm-publish.")
          echo "release PR: ${PR_URL}"
          # GITHUB_TOKEN-created PRs don't trigger `on: pull_request` workflows (anti-recursion),
          # so the required `test` check would never report and auto-merge would hang forever.
          # Dispatch the Test workflow against the branch explicitly — its check run lands on the
          # branch head SHA, which is exactly what the ruleset's required check matches on.
          gh workflow run test.yml --ref "${BRANCH}"
          gh pr merge --auto --squash "${PR_URL}"
          {
            echo "## Release PR opened: v${VERSION}"
            echo ""
            echo "- ${PR_URL} (auto-merges when \`test\` is green)"
            echo "- Next: dispatch this workflow with **mode=publish** after the merge."
          } >> "${GITHUB_STEP_SUMMARY}"

  # PHASE 2 — tag + GitHub release + npm publish of the merged release commit on main.
  # Idempotent: safe to re-dispatch after a partial failure (tag/release are create-if-missing,
  # workspace publishes ride --tolerate-republish).
  publish:
    if: ${{ inputs.mode == 'publish' }}
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 30
    permissions:
      contents: write # push the version tag + create the GitHub release
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # The release PR must have merged: every workspace manifest on main must agree with the root.
      # A drifted tree means phase 1 hasn't landed (or landed partially) — publishing it would ship
      # mixed versions.
      - name: Verify version sync on main
        id: version
        run: |
          set -euo pipefail
          node - <<'NODE'
          const { readFileSync } = require("node:fs")
          const root = JSON.parse(readFileSync("package.json", "utf8")).version
          const workspaces = JSON.parse(readFileSync(".release-it.json", "utf8")).plugins["@release-it-plugins/workspaces"].workspaces
          const drift = workspaces
            .map((ws) => [ws, JSON.parse(readFileSync(`${ws}/package.json`, "utf8")).version])
            .filter(([, v]) => v !== root)
          if (drift.length) {
            console.error(`version drift vs root ${root}:`, drift)
            process.exit(1)
          }
          console.log(`main is version-synced at ${root} (root + ${workspaces.length} workspaces)`)
          NODE
          echo "version=$(node -p "require('./package.json').version")" >> "${GITHUB_OUTPUT}"

      # Fetch the weight binaries from the PUBLIC Hugging Face bucket (the same
      # files the demo loads at runtime — no auth needed). The whole release, weights included,
      # publishes from CI via OIDC: no npm credentials anywhere. Requires the model AND the #718
      # soft-feed postcode binaries AND (when en-gb ships one) the placetype-pair-index
      # binary to be staged on HF for this version (push them with `mailwoman release hf
      # <version> --postcodes postcode-us.bin,postcode-fr.bin,postcode-gb.bin --pair-indexes
      # pair-index-gb.bin` before dispatching a real run; the gazetteer lexicon is a
      # checked-in repo file). Skipped on dry runs so a preview doesn't depend on HF staging.
      - name: Fetch weight binaries from Hugging Face
        if: ${{ !inputs.dry_run }}
        run: | # shell
          set -euo pipefail
          MODEL_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('neural-weights-en-us/model-card.json','utf8')).version)")
          BASE="https://huggingface.co/buckets/sister-software/mailwoman/resolve/en-us/v${MODEL_VERSION}"
          # PREFLIGHT — fail fast + actionable. Without this, an unstaged version means the retry
          # loop below spends 6×5s PER FILE and then dies on a cryptic `curl (22) 404`. On 2026-07-16
          # a v6.4.0 publish failed here because the promote bumped the model card but the HF upload —
          # a SEPARATE operator-host step (RELEASING.md §3) — was skipped. HEAD-check every file this
          # step will fetch and, if any is missing, print the exact remediation and stop immediately.
          echo "Preflight: verifying v${MODEL_VERSION} is staged on Hugging Face…"
          MISSING=0
          for a in model.onnx tokenizer.model postcode-us.bin postcode-fr.bin postcode-gb.bin pair-index-gb.bin; do
            if ! curl -fsI "${BASE}/${a}" >/dev/null 2>&1; then echo "  ✗ MISSING ${BASE}/${a}"; MISSING=1; else echo "  ✓ ${a}"; fi
          done
          if [ "$MISSING" = 1 ]; then
            echo "::error::v${MODEL_VERSION} weights are NOT fully staged on Hugging Face — the promote bumped the model card but the HF upload was skipped. Stage them, then re-dispatch:"
            echo "::error::  HF_TOKEN=\$(cat ~/.cache/huggingface/token) node mailwoman/out/cli.js release hf v${MODEL_VERSION} --locale en-us --model <int8.onnx> --tokenizer <tokenizer.model> --model-card neural-weights-en-us/model-card.json --fst <fst-en-US.bin> --postcodes neural-weights-en-us/postcode-us.bin,neural-weights-fr-fr/postcode-fr.bin,neural-weights-en-gb/postcode-gb.bin --pair-indexes neural-weights-en-gb/pair-index-gb.bin --gazetteer-lexicon data/gazetteer/anchor-lexicon-v1.json --country-lexicon data/gazetteer/country-surface-lexicon-v1.json --set-default   (RELEASING.md §3)"
            exit 1
          fi
          echo "Fetching weights for v${MODEL_VERSION} from ${BASE}"
          # --retry-all-errors covers HF's transient 429 throttling of the public bucket on CI.
          CURL="curl -fSL --retry 6 --retry-delay 5 --retry-all-errors"
          $CURL "${BASE}/model.onnx" -o neural-weights-en-us/model.onnx
          $CURL "${BASE}/tokenizer.model" -o neural-weights-en-us/tokenizer.model
          # Soft-feed artifacts (#718/#720): the anchor channels loadFromWeights feeds by DEFAULT —
          # without them the published package warns + runs anchor-OFF (the #566/#685 OOD crater). The
          # per-country PCB1 postcode binaries are built from the WOF shard (not buildable on CI), so
          # they ride the bucket; all land under en-us/v<version>/ by basename via
          # `mailwoman release hf <version> --postcodes postcode-us.bin,postcode-fr.bin,postcode-gb.bin`.
          $CURL "${BASE}/postcode-us.bin" -o neural-weights-en-us/postcode-us.bin
          $CURL "${BASE}/postcode-fr.bin" -o neural-weights-fr-fr/postcode-fr.bin
          $CURL "${BASE}/postcode-gb.bin" -o neural-weights-en-gb/postcode-gb.bin
          # The placetype-pair-index binary (placetype-pair-prior arc, Task 8): built from the HM Land
          # Registry PPD tuples CSV (not buildable on CI, same story as the postcode binaries above),
          # so it rides the bucket too, via `mailwoman release hf <version> --pair-indexes
          # pair-index-gb.bin`. COUNTRY-SPECIFIC BY DESIGN — no base-package fallback (unlike
          # model.onnx/tokenizer.model below), so en-gb MUST have its own copy staged.
          $CURL "${BASE}/pair-index-gb.bin" -o neural-weights-en-gb/pair-index-gb.bin
          # fr-fr and en-gb share the en-us model for now (locale-specific weights are future work).
          cp neural-weights-en-us/model.onnx neural-weights-fr-fr/model.onnx
          cp neural-weights-en-us/tokenizer.model neural-weights-fr-fr/tokenizer.model
          cp neural-weights-en-us/model.onnx neural-weights-en-gb/model.onnx
          cp neural-weights-en-us/tokenizer.model neural-weights-en-gb/tokenizer.model
          # The gazetteer-anchor lexicon is a checked-in repo artifact — copy it into every package
          # (no bucket dependency); matches release.config.json softFeed.gazetteerLexicon + copy-weights.
          cp data/gazetteer/anchor-lexicon-v1.json neural-weights-en-us/anchor-lexicon-v1.json
          cp data/gazetteer/anchor-lexicon-v1.json neural-weights-fr-fr/anchor-lexicon-v1.json
          cp data/gazetteer/anchor-lexicon-v1.json neural-weights-en-gb/anchor-lexicon-v1.json
          # The country-surface lexicon (#1104) — same story: a checked-in repo artifact the country channel
          # feeds when the card carries requires.country. Copy into every package (matches softFeed.countryLexicon).
          cp data/gazetteer/country-surface-lexicon-v1.json neural-weights-en-us/country-surface-lexicon-v1.json
          cp data/gazetteer/country-surface-lexicon-v1.json neural-weights-fr-fr/country-surface-lexicon-v1.json
          cp data/gazetteer/country-surface-lexicon-v1.json neural-weights-en-gb/country-surface-lexicon-v1.json
          for f in neural-weights-en-us/model.onnx neural-weights-fr-fr/model.onnx neural-weights-en-gb/model.onnx \
                   neural-weights-en-us/postcode-us.bin neural-weights-fr-fr/postcode-fr.bin neural-weights-en-gb/postcode-gb.bin \
                   neural-weights-en-gb/pair-index-gb.bin \
                   neural-weights-en-us/anchor-lexicon-v1.json neural-weights-fr-fr/anchor-lexicon-v1.json neural-weights-en-gb/anchor-lexicon-v1.json \
                   neural-weights-en-us/country-surface-lexicon-v1.json neural-weights-fr-fr/country-surface-lexicon-v1.json neural-weights-en-gb/country-surface-lexicon-v1.json; do
              [ -s "$f" ] || { echo "::error::missing/empty $f — is v${MODEL_VERSION} fully staged on HF (model + tokenizer + --postcodes postcode-us.bin,postcode-fr.bin,postcode-gb.bin --pair-indexes pair-index-gb.bin)?"; exit 1; }
          done
          ls -lh neural-weights-en-us/model.onnx neural-weights-en-us/postcode-us.bin neural-weights-en-gb/pair-index-gb.bin

      - name: Tag + GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: | # shell
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "v${VERSION}" | grep -q .; then
            echo "tag v${VERSION} already on origin (recovery re-run) — skipping tag push"
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub release v${VERSION} already exists (recovery re-run) — skipping"
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          fi

      # Publish every workspace at its (already-merged) package.json version via OIDC.
      # #756: derive the workspace set from .release-it.json — ONE source of truth, dependency
      # order preserved (core … mailwoman). --tolerate-republish makes re-runs no-ops per package;
      # the loop continues past per-package failures and reports the full failed set at the end, so
      # one run pinpoints every package that still rejects OIDC instead of stopping at the first.
      - name: Publish workspaces (per-workspace, OIDC)
        if: ${{ !inputs.dry_run }}
        env:
          MAILWOMAN_SKIP_WEIGHTS_COPY: "1"
          RELEASE_IT_WORKSPACES_TAG: latest
          RELEASE_IT_WORKSPACES_ACCESS: public
        run: | # shell
          set -uo pipefail
          # publish-workspace.ts imports @mailwoman/core/env, which resolves to the COMPILED
          # core/out tree (#874) — compile first or every workspace publish dies ERR_MODULE_NOT_FOUND.
          yarn compile
          WORKSPACES=$(node -p "require('./.release-it.json').plugins['@release-it-plugins/workspaces'].workspaces.join(' ')")
          echo "workspaces (from .release-it.json): ${WORKSPACES}"
          FAILED=()
          for ws in ${WORKSPACES}; do
            echo "::group::publish ${ws}"
            if RELEASE_IT_WORKSPACES_PATH_TO_WORKSPACE="./${ws}" node scripts/publish-workspace.ts; then
              echo "  ✓ ${ws}"
            else
              echo "::warning::publish failed for ${ws}"
              FAILED+=("${ws}")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::publish: failed workspaces: ${FAILED[*]}"
            exit 1
          fi
          echo "All workspaces published at v${{ steps.version.outputs.version }}."

      - name: "Dry run: compile only"
        if: ${{ inputs.dry_run }}
        run: | # shell
          yarn compile
          echo "Dry run: version sync + compile verified for v${{ steps.version.outputs.version }}. No tag, no release, no publish."

  # Regenerate the Python + Rust API clients (Phase 5 Task 4) as INSPECTION ARTIFACTS — this job
  # never publishes anything (registry publishing = publish-python.yml / publish-cargo.yml, each
  # bound to its GitHub environment). Additive: it only starts once `publish` has already succeeded
  # (`needs: publish`), so it can't turn a working npm release red.
  clients:
    needs: publish
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 20
    # NOTE: this job occupies the workflow-level `publish` concurrency group. During an incident:
    # cancel THIS job from the Actions UI (always safe — it publishes nothing) to free the queue.
    # Least privilege: no pushes, no OIDC — neither `contents: write` nor `id-token: write`.
    permissions:
      contents: read
    steps:
      # `ref: main` is deliberate: on a publish run, main already carries the merged release commit
      # (phase 1's PR), so `mailwoman/package.json`'s version — the version every generated client
      # syncs to (see `mailwoman/tools/generate-clients.ts`) — is the just-published one.
      - uses: actions/checkout@v7
        with:
          ref: main
          # Least privilege (see the job's `permissions: contents: read` above): this job never
          # pushes, so it has no business holding a credential that could.
          persist-credentials: false

      # The build block lives in the local composite action (shared with publish-clients.yml's
      # generate job) — setup, compile, `mailwoman clients generate`, crate tarball.
      - name: Generate + verify API clients
        uses: ./.github/actions/generate-clients

      - name: Upload Python client artifact
        uses: actions/upload-artifact@v7
        with:
          name: mailwoman-client-python
          path: clients-build/python/dist/*
          if-no-files-found: error

      - name: Upload Rust client artifact
        uses: actions/upload-artifact@v7
        with:
          name: mailwoman-client-rust
          path: clients-build/mailwoman-client-rust.tar.gz
          if-no-files-found: error
