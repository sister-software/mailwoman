# Manual-dispatch publish workflow with npm Trusted Publishing.
#
# Triggered from GitHub Actions UI → "Run workflow". Bumps versions
# (sync across all workspaces), tags, pushes, publishes to npm, and
# creates a GitHub release. Same flow as the local `yarn release`
# documented in RELEASING.md, just running in CI.
#
# Auth: npm Trusted Publishing (OIDC). No NPM_TOKEN secret needed in
# this workflow — npmjs.com is configured to accept publishes from
# this exact workflow file (path: .github/workflows/publish.yml). The
# `id-token: write` permission below is what lets GitHub Actions mint
# the OIDC token npm verifies against.
#
# GITHUB_TOKEN is provided automatically by the runtime.
#
# Publishes ALL packages — code AND the neural-weights-* — entirely from
# CI via OIDC, so no npm credentials live anywhere. The weights workspaces
# ship real model.onnx + tokenizer.model binaries; the "Fetch weight
# binaries from Hugging Face" step below pulls them from the PUBLIC HF
# bucket (the same files the demo loads, no auth) before publish, so the
# binaries don't need to be on the runner. Prerequisite for a real run:
# the model for this version must already be staged on HF — push it with
# `mailwoman release hf` (HF token, run on the operator's host)
# first. (A prior R2 weights-pull lived here; mailwoman-assets is the
# training-data bucket, the pull never reliably shipped a model, and it
# was removed. The model store is Hugging Face.)
#
# A second job, `clients`, runs after `publish` succeeds: it regenerates the
# Python + Rust API clients (`mailwoman clients generate` — Phase 5 Task 4)
# against whatever `mailwoman/package.json` reads on `main` at that point (the
# just-bumped version on a real run, unchanged on a dry run) and uploads both
# as workflow artifacts on EVERY dispatch — inspection copies only. This
# workflow NEVER publishes clients: registry publishing lives in the two
# environment-bound workflows `publish-python.yml` (PyPI Trusted Publishing,
# `pypi` environment — PyPI's trust binds to that exact filename) and
# `publish-cargo.yml` (`cargo` environment's CARGO_REGISTRY_TOKEN secret),
# dispatched separately by the operator. See RELEASING.md "Client packages".
name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch / minor / major / specific semver like 2.1.0)"
        required: true
        default: patch
        type: string
      dry_run:
        description: "Dry run — show what would happen, don't actually publish"
        required: false
        default: false
        type: boolean
      publish_only:
        description: "Finish a partial release: skip release-it's version bump/tag (already done) and just publish each workspace at its current version via OIDC (--tolerate-republish). Use when a prior run bumped+tagged but failed mid-publish."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  # Opt into Node 24 for JavaScript-based actions (checkout, setup-node, etc.)
  # ahead of the forced switch in June 2026 / removal in Sep 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Serialize publish runs. Don't cancel an in-flight publish — release-it has
# already created commits/tags by the time a second dispatch arrives, and
# killing it mid-flight leaves the repo in a partial-release state.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          # release-it needs full history to compute the version tag base.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Configure git identity (for release-it commits)
        run: | # shell
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: yarn install --immutable

      # Fetch the weight binaries from the PUBLIC Hugging Face bucket (the same
      # files the demo loads at runtime — no auth needed). This replaces the old
      # R2 pull and means the whole release, weights included, publishes from CI
      # via OIDC: no npm credentials anywhere. Requires the model AND the #718
      # soft-feed postcode binaries to be staged on HF for this version (push them
      # with `mailwoman release hf <version> --postcodes postcode-us.bin,postcode-fr.bin`
      # before dispatching a real run; the gazetteer lexicon is a checked-in repo
      # file). Skipped on dry runs so a preview doesn't depend on HF staging.
      - name: Fetch weight binaries from Hugging Face
        if: ${{ !inputs.dry_run }}
        run: | # shell
          set -euo pipefail
          MODEL_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('neural-weights-en-us/model-card.json','utf8')).version)")
          BASE="https://huggingface.co/buckets/sister-software/mailwoman/resolve/en-us/v${MODEL_VERSION}"
          echo "Fetching weights for v${MODEL_VERSION} from ${BASE}"
          # --retry-all-errors covers HF's transient 429 throttling of the public bucket on CI.
          CURL="curl -fSL --retry 6 --retry-delay 5 --retry-all-errors"
          $CURL "${BASE}/model.onnx" -o neural-weights-en-us/model.onnx
          $CURL "${BASE}/tokenizer.model" -o neural-weights-en-us/tokenizer.model
          # Soft-feed artifacts (#718/#720): the anchor channels loadFromWeights feeds by DEFAULT —
          # without them the published package warns + runs anchor-OFF (the #566/#685 OOD crater). The
          # per-country PCB1 postcode binaries are built from the WOF shard (not buildable on CI), so
          # they ride the bucket; both land under en-us/v<version>/ by basename via
          # `mailwoman release hf <version> --postcodes postcode-us.bin,postcode-fr.bin`.
          $CURL "${BASE}/postcode-us.bin" -o neural-weights-en-us/postcode-us.bin
          $CURL "${BASE}/postcode-fr.bin" -o neural-weights-fr-fr/postcode-fr.bin
          # fr-fr shares the en-us model for now (locale-specific weights are future work).
          cp neural-weights-en-us/model.onnx neural-weights-fr-fr/model.onnx
          cp neural-weights-en-us/tokenizer.model neural-weights-fr-fr/tokenizer.model
          # The gazetteer-anchor lexicon is a checked-in repo artifact — copy it into both packages
          # (no bucket dependency); matches release.config.json softFeed.gazetteerLexicon + copy-weights.
          cp data/gazetteer/anchor-lexicon-v1.json neural-weights-en-us/anchor-lexicon-v1.json
          cp data/gazetteer/anchor-lexicon-v1.json neural-weights-fr-fr/anchor-lexicon-v1.json
          for f in neural-weights-en-us/model.onnx neural-weights-fr-fr/model.onnx \
                   neural-weights-en-us/postcode-us.bin neural-weights-fr-fr/postcode-fr.bin \
                   neural-weights-en-us/anchor-lexicon-v1.json neural-weights-fr-fr/anchor-lexicon-v1.json; do
              [ -s "$f" ] || { echo "::error::missing/empty $f — is v${MODEL_VERSION} fully staged on HF (model + tokenizer + --postcodes postcode-us.bin,postcode-fr.bin)?"; exit 1; }
          done
          ls -lh neural-weights-en-us/model.onnx neural-weights-en-us/postcode-us.bin

      - name: Release
        if: ${{ !inputs.publish_only }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # copy-weights is always skipped (its /mnt/playpen source paths don't
          # exist on CI) — the binaries are placed by the HF fetch step above.
          # On a real run we DO publish the weights packages (binaries present);
          # on a dry run we skip them (no binaries fetched, nothing to publish).
          MAILWOMAN_SKIP_WEIGHTS_COPY: "1"
          MAILWOMAN_SKIP_WEIGHTS: ${{ inputs.dry_run && '1' || '' }}
        run: | # shell
          set -euo pipefail
          # publish-workspace.ts (a release-it hook) imports @mailwoman/core/env, which resolves
          # to the COMPILED core/out tree (#874 moved env into core) — compile before release-it
          # or every workspace publish dies ERR_MODULE_NOT_FOUND. The publish_only path below
          # already compiles; this is the same requirement on the normal path (first bit v5.1.0).
          yarn compile
          ARGS=(--ci --increment="${{ inputs.version }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
              ARGS+=(--dry-run)
          fi
          yarn release "${ARGS[@]}"

      # Recovery path for a partial release: a prior run already bumped + tagged +
      # pushed (release-it does git BEFORE npm), but died mid-publish (e.g. one
      # package missing its npm Trusted Publisher). Re-running the normal flow would
      # collide with the existing tag. This skips all git/version work and just
      # publishes each workspace AT ITS CURRENT package.json version via the same
      # per-workspace path (OIDC + --tolerate-republish, so already-published
      # versions are no-ops). Continues past per-package failures and reports the
      # full failed set at the end, so one run pinpoints every package that still
      # rejects OIDC instead of stopping at the first.
      - name: Finish publish (per-workspace, OIDC, no git bump)
        if: ${{ inputs.publish_only && !inputs.dry_run }}
        env:
          MAILWOMAN_SKIP_WEIGHTS_COPY: "1"
          RELEASE_IT_WORKSPACES_TAG: latest
          RELEASE_IT_WORKSPACES_ACCESS: public
        run: | # shell
          set -uo pipefail
          yarn compile
          # #756: derive the workspace set from .release-it.json — the SAME list release-it publishes on a
          # normal run — so this recovery loop can't drift from it (the v4.12.0 tiger-skip: tiger was in
          # .release-it.json but missing from the hardcoded list here, so publish_only silently skipped it).
          # The order (core … mailwoman) is the dependency order release-it already uses. The #757 test
          # asserts every entry carries a repository field, so a new workspace can't reach release malformed.
          WORKSPACES=$(node -p "require('./.release-it.json').plugins['@release-it-plugins/workspaces'].workspaces.join(' ')")
          echo "publish_only workspaces (from .release-it.json): ${WORKSPACES}"
          FAILED=()
          for ws in ${WORKSPACES}; do
            echo "::group::publish ${ws}"
            if RELEASE_IT_WORKSPACES_PATH_TO_WORKSPACE="./${ws}" node scripts/publish-workspace.ts; then
              echo "  ✓ ${ws}"
            else
              echo "::warning::publish failed for ${ws}"
              FAILED+=("${ws}")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::publish_only: failed workspaces: ${FAILED[*]}"
            exit 1
          fi
          echo "All workspaces published."

  # Regenerate the Python + Rust API clients (Phase 5 Task 4) as INSPECTION ARTIFACTS — this job
  # never publishes anything (registry publishing = publish-python.yml / publish-cargo.yml, each
  # bound to its GitHub environment). Additive: it only starts once `publish` has already succeeded
  # (`needs: publish`), so it can't turn a working npm release red.
  clients:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # NOTE: this job occupies the workflow-level `publish` concurrency group (artifact generation
    # always runs on dispatch). A follow-up dispatch — notably the `publish_only` recovery path —
    # queues behind it for the cold setup+generate leg. During an incident: cancel THIS job from the
    # Actions UI (always safe — it publishes nothing) to free the queue immediately.
    # Least privilege: this job doesn't push commits/tags (unlike `publish`) and doesn't use npm's
    # OIDC Trusted Publishing, so it needs neither `contents: write` nor `id-token: write`.
    permissions:
      contents: read
    steps:
      # `ref: main` (not the dispatch SHA) is deliberate: on a real (non-dry-run, non-publish_only)
      # run, the `publish` job above just committed + pushed the version bump to `main` via
      # release-it. The default checkout would pin `github.sha` — the commit that existed BEFORE that
      # push — which would generate clients at the OLD, already-superseded version. Checking out
      # `main` fresh pulls that just-pushed commit instead, so `mailwoman/package.json`'s version (the
      # version every generated client syncs to — see `mailwoman/tools/generate-clients.ts`) is
      # correct. This is safe because the whole publish flow is main-only by construction
      # (`.release-it.json`'s `git.requireBranch: "main"` already refuses to release from anywhere
      # else), so `main` and "the release that just ran" always agree once `publish` has succeeded.
      - uses: actions/checkout@v7
        with:
          ref: main
          # Least privilege (see the job's `permissions: contents: read` above): this job never
          # pushes, so it has no business holding a credential that could.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      # Same action + pin `test.yml` already uses for `lint:python`'s ruff-via-uvx step — `uv`/`uvx`
      # aren't preinstalled on the runner image.
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned to the lab host's uv (keep in lockstep — bump deliberately, not via "latest";
          # silences setup-uv's could-not-determine-version fallback warning).
          version: "0.11.16"

      # `@stable` is the action's own documented usage (a tracking ref it repoints itself, not a
      # release tag) — the canonical way to pull this action, matching how the rest of this file pins
      # third-party actions by ref rather than SHA (see `astral-sh/setup-uv@v7` above).
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Compile
        run: yarn compile

      # The full pipeline this job replays locally-verified in Task 3: emit all 8 OpenAPI documents →
      # generate the Python package (openapi-python-client) → assemble the Rust crate (progenitor) →
      # `uv build` + wheel import-check → `cargo check --examples`. A non-zero exit here fails the job
      # before either upload-artifact step runs, so a broken generator/spec drift never gets an
      # artifact that looks shippable.
      - name: Generate + verify API clients
        run: node mailwoman/out/cli.js clients generate

      # `actions/upload-artifact` can't glob a directory tree into one file, so the Rust crate (a
      # whole directory: Cargo.toml, src/, vendored openapi/*.json, examples/) is tarred first. The
      # `cargo check --examples` step above leaves a `target/` build cache under the crate dir —
      # excluded here, since it's regenerable local build output, not part of what `cargo publish`
      # would ship (Cargo.toml's own `include` list already excludes it from the crate contents).
      - name: Package Rust crate artifact
        run: tar --exclude=target -czf clients-build/mailwoman-client-rust.tar.gz -C clients-build rust

      - name: Upload Python client artifact
        uses: actions/upload-artifact@v7
        with:
          name: mailwoman-client-python
          path: clients-build/python/dist/*
          if-no-files-found: error

      - name: Upload Rust client artifact
        uses: actions/upload-artifact@v7
        with:
          name: mailwoman-client-rust
          path: clients-build/mailwoman-client-rust.tar.gz
          if-no-files-found: error

