# Manual-dispatch publish workflow with npm Trusted Publishing.
#
# Triggered from GitHub Actions UI → "Run workflow". Bumps versions
# (sync across all workspaces), tags, pushes, publishes to npm, and
# creates a GitHub release. Same flow as the local `yarn release`
# documented in RELEASING.md, just running in CI.
#
# Auth: npm Trusted Publishing (OIDC). No NPM_TOKEN secret needed in
# this workflow — npmjs.com is configured to accept publishes from
# this exact workflow file (path: .github/workflows/publish.yml). The
# `id-token: write` permission below is what lets GitHub Actions mint
# the OIDC token npm verifies against.
#
# GITHUB_TOKEN is provided automatically by the runtime.
#
# ⚠ This workflow publishes the CODE packages only. The
# neural-weights-{en-us,fr-fr} workspaces ship real model.onnx +
# tokenizer.model binaries that live at /mnt/playpen on the operator's
# host (not in git, not fetchable from CI), so weights are always cut
# LOCALLY via `yarn release` + scripts/copy-weights.mjs (see
# RELEASING.md). Here, copy-weights short-circuits and
# publish-workspace.mjs exits 0 for the weights workspaces; the plugin
# still bumps their package.json versions on disk so the monorepo stays
# version-synced, and the local weights publish picks up that version.
# (A prior R2 weights-pull lived here; it was the training-data bucket,
# never reliably shipped a model, and was removed — the model store is
# Hugging Face, published via scripts/publish-release-to-hf.mjs.)
name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch / minor / major / specific semver like 2.1.0)"
        required: true
        default: patch
        type: string
      dry_run:
        description: "Dry run — show what would happen, don't actually publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  # Opt into Node 24 for JavaScript-based actions (checkout, setup-node, etc.)
  # ahead of the forced switch in June 2026 / removal in Sep 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Serialize publish runs. Don't cancel an in-flight publish — release-it has
# already created commits/tags by the time a second dispatch arrives, and
# killing it mid-flight leaves the repo in a partial-release state.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # release-it needs full history to compute the version tag base.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Configure git identity (for release-it commits)
        run: | # shell
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-only release. Skip copy-weights (its /mnt/playpen source
          # paths don't exist on CI) and tell publish-workspace.mjs to
          # exit 0 for the neural-weights-* workspaces. The plugin still
          # bumps their package.json versions on disk so the monorepo
          # stays version-synced; the actual weights npm publish is cut
          # locally (RELEASING.md), where copy-weights has the binaries.
          MAILWOMAN_SKIP_WEIGHTS_COPY: "1"
          MAILWOMAN_SKIP_WEIGHTS: "1"
        run: | # shell
          set -euo pipefail
          ARGS=(--ci --increment="${{ inputs.version }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
              ARGS+=(--dry-run)
          fi
          yarn release "${ARGS[@]}"
