# v3.10.0-span-ship-probe — #727 STAGE 2, STEP 4 (plan #1134): the span-scorer head on the SHIPPED
# v381 recipe. 2k probe. TWO variables vs v3.8.1 (v381), each with its OWN pre-registered read leg:
#
#   1. model.use_span_scorer + train.span_head_learning_rate 1.0e-3 — the stage-2 semi-CRF span head
#      (span_loss_weight/span_dim/max_span VERBATIM v3.0.1), fresh-initialized on the shipped v381
#      weights. The phase-1 lesson is baked in: a FRESH head gets its OWN param group at 1e-3 while
#      the pretrained encoder stays at 1e-5 (v3.0.0 was mis-specified without it — span NLL never
#      converged at 2k).
#   2. data.augment_upper_case_prob 0.15 — P3 (#829/#690): ALL-CAPS training copies mirroring
#      lowercase_row semantics (b3d741bd). Read is off-manifold for leg 1 (case vs span structure),
#      so cross-contamination risk is low; the joint recipe is what would ship regardless.
#
# PRE-REGISTERED READS (2k):
#   LEG 1 (span) — span NLL converging toward O(1) (v301 precedent: 26.4 -> ~2 by 2k with the LR
#     group); seg@1 > token@1 on the starved python gate (scripts/eval_seg_at_1.py — RELATIVE read,
#     both heads share the starved encoder; absolutes are NOT the JS harness numbers).
#   LEG 2 (all-caps) — uppercase-perturbed golden-us subset (n>=200), exact-match with
#     normalizeCase OFF, package-shaped int8: probe must BEAT v381 on the same rows by >=5pp
#     (v381 has zero all-caps training signal; anything less says the augment is inert -> drop it
#     and keep the #690 shim).
#   GUARDS (noise-read at 2k, binding at 8k): golden us/fr micro within noise of v381; FR fragment
#     board + digit board no worse than -2pp; BIO decode quality unchanged on presets (the span head
#     is an ADDITIONAL output — the token path must stay byte-stable-ish under the shared encoder).
#   NOT a promote gate. The 8k full run pre-registers the standing battery (golden 2pp gate,
#   gauntlet, metamorphic, fragment boards) + oracle@5 / seg@1 on the JS harness via the PR #1154
#   decode surface + the isotonic ambiguity-gate fit (plan req 4).
#
# fp32 partition math enforced inside span_scorer.py regardless of autocast (v0.5.0 bf16 CRF scar).
# Same corpus + tokenizer as v381 -> all F1 comparisons vs v381 are VALID.
data:
  corpus_dir: /data/corpus/versioned/v0.11.0-no-fragment/corpus-v0.11.0-no-fragment
  tokenizer_dir: /data/models/tokenizer/v0.9.0-multisplice
  max_length: 128
  country_weights: # VERBATIM v2.4.1.
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    "NO": 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
  source_weights: # v3.1.0 weights + synth-no-fragment (the ONE new variable); synth-no-street-led ZEROED (its on-disk part predates --exclude-surfaces and is contaminated vs the board — see the overlay note).
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 0.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    # PROBE 1: the fragment/autocomplete shard (assay weight — moderate precedent).
    synth-fragment: 6.0
    # #727 T2 NEW — the ONE variable. 12.0 = the targeted-fix precedent (fr-bare-street,
    # si-bare-village, no-street-led are all 12.0). Streets with NO house number + the
    # bare-locality counter.
    synth-fr-fragment: 12.0
    # Track B — the NO house-number-licence lever. 12.0 = the targeted-fix tier
    # (matches fr-fragment). Bare streets + street+number with NO postcode partner, + counters.
    synth-no-fragment: 12.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  # #1101 FIX — the delimiter-free augmentation (built+tested, never shipped): an extra comma-stripped
  # copy per row so the model segments street/locality without leaning on the comma. Closes the gauntlet
  # comma-drop INV (White House + FR Rue du Chevaleret). ONE new variable vs v373.
  augment_punct_drop_prob: 0.3
  # P3 (#829): ALL-CAPS copies, mirroring lowercase_row (skip-row on multi-char case-folds, tokens too).
  augment_upper_case_prob: 0.15
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  # #1104 country-lexicon channel — the dedicated country soft-feed vocabulary (feature_dim 2).
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.4.1.
  hidden_size: 384
  # #727 stage-2: the semi-CRF span scorer (VERBATIM v3.0.1 keys) on the ship recipe.
  use_span_scorer: true
  span_loss_weight: 0.5
  span_dim: 128
  max_span: 8
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  # #1104 country channel ON — dedicated 2-dim [country_surface, country_ambiguous] soft feed with its
  # own projection + confidence (must equal the lexicon's feature_dim). Default-False elsewhere, so a
  # resume from a pre-country checkpoint stays byte-identical until this flips.
  use_country_anchor: true
  country_feature_dim: 2
  # #1104 homograph-guard SOFTENER — the ONE variable vs v263. Scales the country_ambiguous dim by 0.5
  # before the country_projection (bakes into the exported ONNX; no lexicon/inference change). v263's
  # hard guard (scale 1.0) over-suppressed homograph countries Georgia/Jordan (country-homograph F1
  # 89.8->82.6); softening should recover homograph recall while holding the WOF-admin country win.
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train: # Same-vocab init_from fine-tune off the SHIPPED v261 (fresh optimizer; --resume none on a fresh
  # output_dir honors init_from, weights only). The new country_projection starts random and learns to
  # route the cue; the encoder keeps v261's span-boundary + street grammar.
  output_dir: /data/output-v3100-span-ship-probe-s42/checkpoints
  seed: 42
  init_from: /data/output-v381-punct-fix-full-s42/checkpoints/step-008000
  # Phase-1 lesson (v3.0.0 vs v3.0.1): the fresh span head gets its own param group.
  span_head_learning_rate: 1.0e-3
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip_norm: 1.0
  max_steps: 2000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v3.10.0-span-ship-probe-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
