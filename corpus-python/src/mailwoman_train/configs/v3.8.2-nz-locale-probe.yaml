# === v3.8.2-nz-locale-probe — first Deepparse-parity LOCALE add: New Zealand. 2k PROBE. ===
# init_from the SHIPPED v381 (v7.0.0/6.5.0 weights), fresh optimizer, LR 1e-5 constant, warmup 500, 2000
# steps. The ONE new variable: the synth-nz LINZ locale shard (v0.12.0-nz overlay) + NZ:1.0 in
# country_weights (the allowlist key that admits it) + synth-nz:6.0 (4.2% of the source multinomial).
#
# WHY (task #58, Deepparse parity #1): NZ was untrained (country_weights allowlist dropped it). The
# postmortem's "8,967 rows, just declare it" premise was FALSIFIED — the in-corpus 2,990 NZ rows are all
# synth PO-box (no streets). Real data: openaddresses/extracted/nz/countrywide.csv = 2.12M LINZ-derived
# street rows. NZ column quirk (surface-audited): OA CITY=suburb, DISTRICT=city, POSTCODE 0% — the recipe
# maps DISTRICT->locality, CITY->dependent_locality (districtAsLocality). Eval holds out ~12% of NZ
# localities (source-disjoint coord board).
#
# PRE-REGISTERED READ (written before the numbers; Fable design 2026-07-18):
#   TARGET (the point): NZ coordinate-acceptability EMERGES on the held-out NZ coord board (from ~0, the
#     shipped model can't parse NZ suburb/city order). Bar set once the board is built (report the rate).
#   GUARD (must not regress the 23): golden 2pp gate — no shipped tag >2pp below v381. The battery MUST
#     include the US #1101 comma-free board + the FR fragment board (the two hard-won results a new-locale
#     gradient most plausibly erodes) + the NO digit board (bare-street-hn 0.733, bare-pc 1.000).
#   GUARD: gauntlet PASS; metamorphic INV[comma-drop] holds.
#   FORGETTING: source_weights is the knob (exact multinomial); synth-nz 4.2% is inside the ≤5-8% safe band.
#   SILENT-DROP CHECK: confirm the shard-index log shows synth-nz with nonzero pulls in the first steps
#     (a country/source-key mismatch drops every NZ row and the run "passes" having trained on nothing new).
#
# ESCALATION: clean 2k -> 8k -> full promote battery -> ship as v7.1.0 (first post-v7 model). Promote = operator.
#
# Launch: modal run -d corpus-python/modal/train_remote.py --config v3.8.2-nz-locale-probe.yaml --resume none

data:
  corpus_dir: /data/corpus/versioned/v0.12.0-nz/corpus-v0.12.0-nz
  tokenizer_dir: /data/models/tokenizer/v0.9.0-multisplice
  max_length: 128
  country_weights: # VERBATIM v2.4.1 + NZ (the ONE new country — first Deepparse-parity locale).
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    "NO": 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
    NZ: 1.0 # NEW — the 24th trained country. Allowlist key (data_loader.py:249): absent → dropped, so this is what admits the synth-nz shard.
  source_weights: # v3.1.0 weights + synth-no-fragment; + synth-nz (the ONE new source this run — NZ locale, 4.2% multinomial share, ≈ synth-german's).
    synth-nz: 6.0 # NZ LINZ locale shard (v0.12.0-nz overlay). 6.0/136.5 ≈ 4.2% of the source multinomial — within the ≤5-8% new-mass band that protects the 23 trained countries (Fable design 2026-07-18).
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 0.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    # PROBE 1: the fragment/autocomplete shard (assay weight — moderate precedent).
    synth-fragment: 6.0
    # #727 T2 NEW — the ONE variable. 12.0 = the targeted-fix precedent (fr-bare-street,
    # si-bare-village, no-street-led are all 12.0). Streets with NO house number + the
    # bare-locality counter.
    synth-fr-fragment: 12.0
    # Track B — the NO house-number-licence lever. 12.0 = the targeted-fix tier
    # (matches fr-fragment). Bare streets + street+number with NO postcode partner, + counters.
    synth-no-fragment: 12.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  # #1101 FIX — the delimiter-free augmentation (built+tested, never shipped): an extra comma-stripped
  # copy per row so the model segments street/locality without leaning on the comma. Closes the gauntlet
  # comma-drop INV (White House + FR Rue du Chevaleret). ONE new variable vs v373.
  augment_punct_drop_prob: 0.3
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  # #1104 country-lexicon channel — the dedicated country soft-feed vocabulary (feature_dim 2).
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.4.1.
  hidden_size: 384
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  # #1104 country channel ON — dedicated 2-dim [country_surface, country_ambiguous] soft feed with its
  # own projection + confidence (must equal the lexicon's feature_dim). Default-False elsewhere, so a
  # resume from a pre-country checkpoint stays byte-identical until this flips.
  use_country_anchor: true
  country_feature_dim: 2
  # #1104 homograph-guard SOFTENER — the ONE variable vs v263. Scales the country_ambiguous dim by 0.5
  # before the country_projection (bakes into the exported ONNX; no lexicon/inference change). v263's
  # hard guard (scale 1.0) over-suppressed homograph countries Georgia/Jordan (country-homograph F1
  # 89.8->82.6); softening should recover homograph recall while holding the WOF-admin country win.
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train: # NZ locale probe — init_from the SHIPPED v381 (v7.0.0/6.5.0 weights), fresh optimizer, fresh
  # output_dir (--resume none honors init_from, weights only). The ONE new variable is the synth-nz
  # shard + NZ:1.0; the encoder keeps v381's grammar and fine-tunes NZ in at constant LR 1e-5. 2k probe.
  output_dir: /data/output-v382-nz-probe-s42/checkpoints
  seed: 42
  init_from: /data/output-v381-punct-fix-full-s42/checkpoints/step-008000
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip_norm: 1.0
  max_steps: 2000
  eval_every_steps: 1000
  save_every_steps: 1000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v3.8.2-nz-locale-probe-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
