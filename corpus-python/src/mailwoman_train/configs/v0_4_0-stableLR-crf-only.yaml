# v0.4.0 stable-LR ablation: §1 per_token CRF ON, §3 class_weights OFF.
#
# Tests whether §1 destabilizes even at the v0.3.0-stable LR (1.5e-4). If this run
# diverges past step 2000, per_token CRF norm × crf_loss_weight=1.0 is the offender
# at any LR. The fix would be either:
#   - per_token norm but keep crf_loss_weight ≤ 0.1 (light hand-weighted scaling)
#   - revert to per_sequence (v0.3.0 was stable that way at 1.5e-4 w/ 0.05)
#
# Recipe:
#   v0.3.0 base:    uniform CE (no class_weights)
#   v0.4.0 added:   §1 per_token CRF + crf_loss_weight=1.0 + §4 source_weights
#   LR:             1.5e-4 (v0.3.0-stable)

data:
  corpus_dir: /data/corpus/versioned/v0.3.0/corpus-v0.3.0
  tokenizer_dir: /data/models/tokenizer/v0.1.0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
  train_rows_per_epoch: null
  val_rows: 4096
  coarse_filter: true

model:
  hidden_size: 256
  num_hidden_layers: 6
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  # §1 per_token CRF norm + weight=1.0.
  crf_normalization: per_token
  crf_loss_weight: 1.0
  # NO class_weights (omitted → uniform CE).

train:
  output_dir: /data/models/checkpoints/v0_4_0-stableLR-crf-only
  seed: 42
  batch_size: 32
  eval_batch_size: 40
  grad_accum_steps: 4
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 50000
  eval_every_steps: 250
  save_every_steps: 100
  log_every_steps: 50
  precision: bf16
  num_workers: 2
  csv_log_path: "{output_dir}/train_log.csv"

eval:
  golden_dir: ""
  val_jsonl: ""
