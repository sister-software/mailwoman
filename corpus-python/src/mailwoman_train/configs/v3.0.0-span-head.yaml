# v3.0.0-span-head — #727 STAGE 2, PHASE 1. ONE variable vs the shipped v264: the semi-Markov span
# scorer (model.use_span_scorer true, span_loss_weight 0.5). Corpus, tokenizer, lexicons, and every
# other channel are VERBATIM v2.6.4. init_from v264 step-008000 — a NEW objective (a fresh head),
# which is the documented init_from case; `resume` is for continuing a capability already being grown.
#
# THE GATE (pre-registered, docs/superpowers/plans/2026-07-15-727-stage2-phase1-span-head.md):
#   seg@1 > token@1 on the parity corpus. Baselines (v264, ship config): street token@1 0.573; a
#   segment decode over the SUMMED-BIO stand-in scored 0.453 — WORSE, which is exactly why a trained
#   span scorer is necessary and decode-hardening alone was falsified (night-3 postmortem).
# Secondary read: oracle@10 must RISE from 0.749. If seg@1 crosses but oracle@10 is flat, the scorer
# reshuffled the list without learning better spans.
#
# This is NOT a promote gate. The standing floors (street 0.90 / hn 0.97 / pc 0.97) and the 2pp golden
# gate are untouched; this checkpoint ships nowhere on its own. Phase 2 (export) only starts if this
# crosses. If seg@1 < token@1: do NOT tune span_loss_weight and re-run — that is the treadmill. One
# diagnostic (is the loss decreasing?), then fork to the operator.
#
# fp32 partition math is enforced inside span_scorer.py regardless of autocast (v0.5.0 bf16 CRF NaN
# scar applies to this exact arithmetic). Measured cost: +29% step time CPU (B=32,S=128).
data:
  corpus_dir: /data/corpus/versioned/v0.10.6-fragment-v5/corpus-v0.10.6-fragment-v5
  tokenizer_dir: /data/models/tokenizer/v0.9.0-multisplice
  max_length: 128
  country_weights: # VERBATIM v2.4.1.
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    "NO": 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
  source_weights: # VERBATIM v2.4.1 + the one new assay shard.
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 12.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    # PROBE 1: the fragment/autocomplete shard (assay weight — moderate precedent).
    synth-fragment: 6.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  # #1104 country-lexicon channel — the dedicated country soft-feed vocabulary (feature_dim 2).
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.6.4 EXCEPT the span-scorer block below (the ONE variable).
  # #727 stage-2 phase 1 — THE one variable vs v264.
  use_span_scorer: true
  span_loss_weight: 0.5
  span_dim: 128
  max_span: 8
  hidden_size: 384
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  # #1104 country channel ON — dedicated 2-dim [country_surface, country_ambiguous] soft feed with its
  # own projection + confidence (must equal the lexicon's feature_dim). Default-False elsewhere, so a
  # resume from a pre-country checkpoint stays byte-identical until this flips.
  use_country_anchor: true
  country_feature_dim: 2
  # #1104 homograph-guard SOFTENER — the ONE variable vs v263. Scales the country_ambiguous dim by 0.5
  # before the country_projection (bakes into the exported ONNX; no lexicon/inference change). v263's
  # hard guard (scale 1.0) over-suppressed homograph countries Georgia/Jordan (country-homograph F1
  # 89.8->82.6); softening should recover homograph recall while holding the WOF-admin country win.
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train: # Same-vocab init_from fine-tune off the SHIPPED v264 (fresh optimizer; --resume none on a fresh
  # output_dir honors init_from, weights only). The span scorer + segment transitions start random and
  # learn to score whole spans; the encoder keeps v264's country channel + span-boundary grammar.
  output_dir: /data/output-v300-span-head-s42/checkpoints
  seed: 42
  init_from: /data/output-v264-country-softguard-s42/checkpoints/step-008000
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip_norm: 1.0
  max_steps: 2000  # PROBE. A 2k probe answers the gate in minutes; 8k only if it crosses.
  eval_every_steps: 1000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v2.6.4-country-softguard-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
