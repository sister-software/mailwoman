# v0.4.0 stable-LR ablation: §4 source_weights ONLY on top of v0.3.0 baseline.
#
# Both lr=5e-4 ablations (ablate-crf, ablate-cw) failed identically, which rules out
# §1 / §3 as single-axis culprits at the v0.4.0 target LR. The operator concluded
# lr=5e-4 is structurally unreachable for THIS codebase regardless of which v0.4.0
# knob is on or off (v0.3.0 itself rejected lr=5e-4 in iteration).
#
# Stable-LR matrix: drop back to v0.3.0's proven lr=1.5e-4 and test each v0.4.0
# lever in isolation on top of v0.3.0's stable recipe. This config tests §4 alone
# — should pass; if it fails the source_weights have a data-loader bug worth fixing.
#
# Recipe:
#   v0.3.0 base:    per_sequence CRF NLL × crf_loss_weight=0.05, NO class_weights
#   v0.4.0 added:   §4 source_weights only
#   LR:             1.5e-4 (v0.3.0-stable)

data:
  corpus_dir: /data/corpus/versioned/v0.3.0/corpus-v0.3.0
  tokenizer_dir: /data/models/tokenizer/v0.1.0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  # §4 v0.4.0 source-weight rebalance.
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
  train_rows_per_epoch: null
  val_rows: 4096
  coarse_filter: true

model:
  hidden_size: 256
  num_hidden_layers: 6
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  # v0.3.0 dual-loss recipe (per_sequence default + crf_loss_weight=0.05).
  crf_loss_weight: 0.05
  # NO class_weights (omitted → default uniform).

train:
  output_dir: /data/models/checkpoints/v0_4_0-stableLR-source-only
  seed: 42
  batch_size: 32
  eval_batch_size: 40
  grad_accum_steps: 4
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 50000
  eval_every_steps: 250
  save_every_steps: 100
  log_every_steps: 50
  precision: bf16
  num_workers: 2
  csv_log_path: "{output_dir}/train_log.csv"

eval:
  golden_dir: ""
  val_jsonl: ""
