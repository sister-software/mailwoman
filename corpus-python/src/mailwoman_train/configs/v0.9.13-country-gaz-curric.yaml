# === v0.9.13-country-gaz-curric (#464) — v0.9.12 + gazetteer-confidence CURRICULUM. ===========
# ONE variable vs v0.9.12: train.gazetteer_curriculum ON (ramped per-row zero-out of the clue, same
# schedule as the postcode anchor). v0.9.12 lifted country 0->83/region+12/locality+15 but cost US
# postcode -3.7 (the model leaned on the always-on clue). The curriculum forces label competence WITH
# AND WITHOUT the clue. GATE: hold v0.9.12 country/region/locality gains AND recover US postcode to
# within ~1pp of v4.1.0 (>=97 fp32). Same corpus/lexicon/weights.
# --- (original v0.9.12 header follows) ---
# === v0.9.12-country-gaz (#464) — STEP 2b: the gazetteer anchor (knowledge-ladder rung 3.2). ===
# ONE variable vs v0.9.11-country-cw: the GAZETTEER ANCHOR channel turns ON (use_gazetteer_anchor +
# data.gazetteer_lexicon_path). Same balanced corpus (v0.4.10-country-bal), same class weights
# (B/I-country 3.5), same recipe/seed. The channel feeds per-token multi-hot candidate-tag-set clues
# (country/region/po_box/cedex/homograph) painted from the RAW SURFACE by the codex-generated
# lexicon — identical computation at train + inference (never gold labels; no leak, no skew).
#
# WHY. v0.9.10 (balanced data) proved country is learnable model-first: P=100, over-fire 0 — but
# recall 40.7. v0.9.11 (class-weight 3.5) lifted recall to 48.1, STILL P=100/over-fire 0. The
# remaining misses are ALL recognition-limited (Eswatini, Timor-Leste, Bhutan, multi-word, leading
# position) — the model cannot recognize a surface it saw ~3 times, which is exactly the lexicon's
# job. The clue INFORMS (the homograph bit says "context is critical here"); the model decides.
# See docs/articles/plan/reference/closed-vocab-fields-model-first.mdx + the knowledge ladder.
#
# PRE-REGISTERED GATE (stop at 20k) — data/eval/external/country-homograph-real.jsonl (n=54):
#   - country RECALL up vs v0.9.11's 48.1 (target: the long-tail/multi-word/leading misses recover;
#     ≥70 would be decisive) AND precision stays ~100 AND over-fire stays 0.
#   - region/locality F1 held (v0.9.11: region 82.2, locality 64.4); homograph rows stay correct
#     (no "Tbilisi, Georgia"→region regressions — the clue must not bulldoze context).
#   - NO-REGRESSION (within ~1pp, fp32-to-fp32 vs v0.9.11): US/FR golden spine via per-locale-f1
#     (WITH --tokenizer — the footgun guard now enforces it); unit retained ≥88; DE native held.
#   DECISION: recall up + P~100 + over-fire 0 + spine flat → the country lever is DONE; promote
#     candidate (consolidation #466 picks it up). If the clue over-fires (model echoes the lexicon,
#     P drops): lower clue exposure — drop gazetteer confidence to 0 on a random ~20% of training
#     rows (curriculum) — and consult DeepSeek before more knobs.
# Measure: score-country-homograph.ts + per-locale-f1.ts (US/FR, --tokenizer) + unit-real +
#   de-order-eval.sh (fp32-to-fp32).
#
# CORPUS: v0.4.10-country-bal (UNCHANGED — single-variable discipline; the lexicon is a side input).
# LEXICON: /data/gazetteer/anchor-lexicon-v1.json (scripts/build-gazetteer-anchor-lexicon.mjs from
#   @mailwoman/codex; modal volume put before launch).
# Launch:
#   modal run -d scripts/modal/train_remote.py \
#     --config v0.9.12-country-gaz.yaml --resume none \
#     --trackio --trackio-space sister-software/mailwoman-trackio

data:
  corpus_dir: /data/corpus/versioned/v0.4.10-country-bal/corpus-v0.4.10-country-bal
  tokenizer_dir: /data/models/tokenizer/v0.6.0-a0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
    DE: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-po-box: 1.5
    synth-intersection: 0.2
    synth-german: 6.0
    # Retained from v4.1.0 — keep the shipped unit win.
    synth-unit: 1.5
    # The balanced country shard (homograph contrast + code-as-region negatives + breadth).
    synth-country: 2.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  # STEP 2b: the codex-generated candidate-tag-set lexicon (gazetteer anchor, #464).
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  # STEP 2b: the gazetteer-anchor input channel (must match the lexicon JSON's feature_dim).
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  class_weights:
    O: 0.5
    # STEP 2a retained: country miss-penalty 3.5 (v0.9.11 — recall 40.7→48.1 at P=100).
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v0913-country-gaz-curric-s42/checkpoints
  seed: 42
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 20000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: true
  trackio_project: mailwoman
  trackio_run_name: v0.9.13-country-gaz-curric-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
