# === v3.5.4-numsplice3-full — B4c SHIP CANDIDATE: 3-digit vocab splice (100-999). 8k. ===
#
# THE ONE VARIABLE vs v3.5.0-numsplice-probe: the splice RANGE. v0.11.1-numsplice3 adds word-start
# pieces 100-999 ONLY (+900), NOT the full 10-9999 (+9,988). So `178` -> `▁178` (ONE piece, the digit
# win survives) while `6000`/`75000`/`90210` STAY multi-piece (`▁600,0` / `▁750,0,0`), keeping their
# postcode-leaning continuations. English letters byte-identical; only 3-digit numeric spans change.
#
# WHY. The full-range 8k (v3.5.1) was a TRADE, not a win: board-3 bare-street-hn +13.2pp (0.693->0.825),
# FR date-name +52pp, the PL 178 row FIXED — but parity postcode REGRESSED 0.986->0.889 (-9.7pp, 7 rows).
# The 7 rows were ALL 4-5 digit postcodes (AU/NL 4-digit, FR 5-digit) absorbed into adjacent street/
# locality spans (docs: scratchpad/deepparse-cmp/NUMSPLICE-verdict.md). A single-piece number merges
# into its neighbour more easily — the property that fixes house_number let 4-5 digit postcodes be
# swallowed. HYPOTHESIS: the cost was carried by the 4-5 digit pieces. Keeping those multi-piece (this
# config) should retain the house_number win WITHOUT the postcode cost.
#
# init_from /data/models/numsplice3-expanded (v310 step-008000, token_embeddings FVT mean-init'd to
# 74,043 — each 100-999 row = mean of its digit constituents; encoder/heads byte-identical).
#
# PRE-REGISTERED READ (the fork this probe adjudicates):
#   PRIMARY (must WIN) — board 3 bare-street-hn rises toward the full-range 0.825 (it is a 3-digit-heavy
#     class); `aleja Wojska Polskiego 178` -> house_number. If the win does NOT appear, 3-digit is too
#     narrow and the range needs 4-digit too — falsifies the "3-digit carries the win" half.
#   GUARD (must HOLD, the whole point) — parity postcode holds at ~0.986 (NOT the -9.7pp of the full
#     range); board 3 bare-pc (Norwegian 4-digit) holds; the 6 demo presets hold. If parity postcode
#     STILL drops, the cost was NOT the 4-5 digit pieces and the splice mechanism is unsalvageable as-is.
#   DO-NO-HARM — FR fragment board + global parity hold.
#
# DECISION TABLE:
#   win HOLDS + guard HOLDS -> SHIP CANDIDATE. 8k, then promote. The clean lever #727 wanted.
#   win HOLDS + guard DROPS -> the trade is intrinsic to single-piece numbers; shelve numsplice, take B4b.
#   win ABSENT + guard HOLDS -> 3-digit too narrow; the win needs 4-digit (widen to 100-9999, re-probe).
#
# SHIP CANDIDATE. The 2k probe (v352) confirmed guard + win; this 8k is the promotable artifact.
# On PASS: export int8, run the gate + boards, then the operator promotes. Promotion is the operator's act.
# Launch: modal run -d corpus-python/modal/train_remote.py --config v3.5.4-numsplice3-full.yaml --resume none

data:
  corpus_dir: /data/corpus/versioned/v0.10.9-fr-fragment/corpus-v0.10.9-fr-fragment
  tokenizer_dir: /data/models/tokenizer/v0.11.1-numsplice3
  max_length: 128
  country_weights: # VERBATIM v2.4.1.
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    "NO": 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
  source_weights: # VERBATIM v2.4.1 + the one new assay shard.
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 12.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    synth-fragment: 6.0
    synth-fr-fragment: 12.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.4.1.
  hidden_size: 384
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  use_country_anchor: true
  country_feature_dim: 2
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v354-numsplice3-full-s42/checkpoints
  seed: 42
  init_from: /data/models/numsplice3-expanded
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip_norm: 1.0
  max_steps: 8000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v3.5.4-numsplice3-full-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
