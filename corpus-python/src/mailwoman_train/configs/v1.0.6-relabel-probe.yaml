# === v1.0.6-relabel-probe (#511 probe — the #492 ladder's data answer) ===========================
# SINGLE-VARIABLE contrast vs PROBE 0 (v1.0.4): data.affix_relabel_lexicon_path SET (everything
# else byte-identical — choreography false, synth-affix 20.0, suffix-tag 4.0, resume the SAME clean
# consolidation step-040000 copied to a fresh dir, +4k steps). Probe 0 is the measured control:
# prefix 81.0 @+2k -> 61.1 @+4k with relabel OFF.
#
# HYPOTHESIS UNDER TEST (the #492 ladder's terminal finding, DeepSeek-concurred 2026-06-10): the
# affix transient decay is CONTRADICTORY LABELS — 69.4% of base street rows label affix surfaces
# monolithically (~467M rows, >=1,039:1 against the shard's effective 450K), and the directional
# augmentation (label-inheriting, p=0.3) mints more every epoch. The relabel pass
# (mailwoman_train/relabel.py, exact shard-builder split semantics, runs AFTER augmentation) makes
# the whole mix agree: trailing USPS suffix -> street_suffix, leading directional -> street_prefix.
#
# PRE-REGISTERED READ (decay-vs-hold, score-affix on real-affix eval, fp32, SAME scorer flags as
# probe 0): prefix at +2k >= ~75 AND drop +2k->+4k <= 2pts  => contradiction theory CONFIRMED ->
# proceed to the full relabel retrain (the #511 run, operator-GO'd). Decay reproduced (>= 10pt
# drop) => hidden factor survives relabeling -> STOP, no full run, back to #492.
# Secondary watches (not gates here): US street folded F1 (should hold — folding is invariant to
# the split), house_number->street_prefix CRF transition sanity, short-street ("Main St") recall.
# Expected transient: a val-loss spike at resume is NORMAL (the label distribution changed under
# the model at step 40k); the +2k read absorbs it.
#
# REQUIRES on the volume: relabel.py + updated config.py/data_loader.py, the relabel lexicon at
# /data/gazetteer/affix-relabel-lexicon-v1.json (built by scripts/build-affix-relabel-lexicon.mjs),
# and the clean step-040000 copied to output-v106-relabel-probe-s42/checkpoints/ (done 2026-06-10).
# Launch:
#   modal run -d scripts/modal/train_remote.py --config v1.0.6-relabel-probe.yaml --resume auto

data:
  corpus_dir: /data/corpus/versioned/v0.4.12-consolidation/corpus-v0.4.12-consolidation
  tokenizer_dir: /data/models/tokenizer/v0.6.0-a0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
    DE: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-po-box: 1.5
    synth-intersection: 0.2
    synth-german: 6.0
    synth-unit: 1.5
    # IDENTICAL to probe 0 — the contrast is relabel only. (The full #511 run will sweep this DOWN:
    # 20.0 was calibrated to fight a contradiction that no longer exists.)
    synth-affix: 20.0
    synth-country: 2.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  gazetteer_choreography: false
  # THE single variable vs probe 0 (#511): end the base-vs-shard affix label contradiction.
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 2.0
    I-street_prefix: 2.0
    B-street_suffix: 4.0
    I-street_suffix: 4.0
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v106-relabel-probe-s42/checkpoints
  seed: 42
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 44000
  eval_every_steps: 1000
  save_every_steps: 1000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v1.0.6-relabel-probe-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
