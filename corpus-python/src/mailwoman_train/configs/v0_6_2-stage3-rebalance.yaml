# v0.6.2 — Stage 3 corpus rebalance to fix v0.6.1's dependent_locality regression.
#
# Recipe per DeepSeek turn 7 sign-off (2026-05-28):
#
#   1. synth-street weight 2.0 → 0.5
#      Reduces the "decompose mode" gradient pressure that v0.6.1 picked up.
#      NOT going lower than 0.5 — the model still needs to learn legitimate US
#      street decomposition. Counter-distribution comes from #2, not from
#      depressing the synth-street signal further.
#
#   2. NEW synth-no-street shard at weight 1.0 (122K rows)
#      Counter-example training data: 112K US + 10K DE/GB rows where every
#      address has venue + admin tags but NO street-side BIO labels. 35% are
#      "venue-adversarial" (Wall Street Industries, 5th Avenue Theatre,
#      Memorial Drive Medical Center) — explicit B-venue/I-venue labels on
#      tokens like Street/Avenue/Drive that the model previously mis-tagged
#      via decompose-mode. The bilingual slice gives a whisper of non-US
#      anti-decompose signal without committing to full v0.7 locale expansion.
#      Build pipeline: corpus/src/synthesize-no-street.ts +
#      scripts/build-no-street-shard.mjs + scripts/extract-tuples-de-gb.py +
#      scripts/jsonl-to-parquet.py.
#
#   3. CRF stays disabled (CE-only) per NaN protocol's "one variable at a time"
#      rule. v0.6.2 already changes the corpus mix. The fp32-CRF diagnostic
#      (configs/v0_6_2-crf-fp32-diagnostic.yaml, 2026-05-28) confirmed the
#      precision hypothesis but enabling CRF in v0.6.2 confounds the corpus
#      change. v0.6.3 will turn it on.
#
#   4. Training dynamics unchanged from v0.6.1: LR 1.5e-4 constant, 1000-step
#      warmup, 100K total steps, v0.6.0-a0 tokenizer. The NaN protocol stays
#      strict — never tune dynamics in the same release as corpus changes.
#
#   5. Early-eval gate at 20K steps: if dep_loc hallucinations > 100 against
#      the v0.6.0 baseline JSON, abort and bump synth-no-street row count
#      (don't drop synth-street further). The eval pipeline must run against
#      a 20K checkpoint, not just 100K.
#
# Promotion decision tree at 100K:
#
#   | Gate eval     | v0-vs-neural harness pass | Action                       |
#   | -------------- | ------------------------- | ---------------------------- |
#   | Pass           | ≥ 25%                     | Promote to default (HF)      |
#   | Pass           | 15-24%                    | Ship as experimental         |
#   | Pass           | ≤ 14.4% (v0.6.0 baseline) | HOLD (sidegrade not release) |
#   | Fail           | any                       | HOLD                         |
#
# Cost: ~5h on A100 at v0.6.0 throughput.
#
# Launch:
#   modal run -d scripts/modal/train_remote.py --config v0_6_2-stage3-rebalance.yaml

data:
  corpus_dir: /data/corpus/versioned/v0.4.0/corpus-v0.4.0
  tokenizer_dir: /data/models/tokenizer/v0.6.0-a0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    deepseek-translit-armn: 0.5
    deepseek-translit-cyrl: 0.5
    deepseek-translit-hang: 0.5
    deepseek-translit-hans: 0.5
    deepseek-translit-jpan: 0.5
    synth-po-box: 1.5
    # === v0.6.2 corpus rebalance ===
    # Down from 2.0. Goal: reduce decompose-mode pressure without abandoning
    # street decomposition entirely. The 4:1 anti-decompose ratio that would
    # come from 0.25 here would overcorrect (per DeepSeek turn 7).
    synth-street: 0.5
    # NEW. 122K-row counter-example shard. Weight 1.0 paired with synth-street
    # at 0.5 gives a 2:1 anti-decompose-to-decompose ratio after the
    # row-count-weighted contribution shakes out (100K × 1.0 ≈ 100K effective
    # steps vs 100K × 0.5 = 50K).
    synth-no-street: 1.0
  train_rows_per_epoch: 1000000
  val_rows: 2048
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  crf_normalization: per_sequence
  # CE-only per NaN protocol. The fp32-CRF diagnostic (2026-05-28) confirmed
  # the precision hypothesis — enabling CRF here would confound the corpus
  # change. Defer learned CRF transitions to v0.6.3 with crf_fp32=true.
  crf_loss_weight: 0.0
  class_weights:
    O: 0.5
    B-country: 2.0
    I-country: 2.0
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v062/checkpoints
  seed: 42
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 100000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
