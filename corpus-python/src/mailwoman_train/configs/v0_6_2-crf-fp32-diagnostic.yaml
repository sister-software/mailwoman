# v0.6.2 diagnostic — fp32-CRF survival test.
#
# Tests the 2026-05-28 night-2 postmortem hypothesis: v0.6.0's twin NaN failures
# (step 950 with crf_loss_weight=0.5, step 1700 with crf_loss_weight=0.1) were
# caused by the 33×33 transition table's masked -inf entries losing precision
# under bf16's 7-bit mantissa.
#
# Recipe: identical to v0.6.1-stage3-streets.yaml EXCEPT
#   1. crf_loss_weight: 0.0 → 0.5            (reactivate CRF training)
#   2. crf_fp32: false → true                (the diagnostic variable)
#   3. max_steps: 100000 → 3000              (we only need to see the previous
#                                             NaN windows: 950 + 1700; 3000 gives
#                                             both with margin to spare)
#   4. eval_every_steps: 2000 → 500          (catch divergence quickly; cheap)
#   5. output_dir: separate v062-crf-diag    (don't clobber other checkpoints)
#
# Expected outcomes:
#   - PASS: training survives past step 1700 without NaN. fp32 hypothesis confirmed.
#     Action: v0.6.3 can re-enable CRF with crf_fp32: true.
#   - FAIL: NaN at the previously-observed steps. fp32 isn't the fix — the
#     issue is elsewhere (transition mask init, label smoothing interaction,
#     class-weight scale). Action: CRF stays disabled until separate
#     investigation; v0.6.2 proceeds CE-only.
#
# Cost: ~30 min on A100 at the v0.6.0 throughput (175 samples/sec × batch 128
# × 3000 steps ≈ 25 min).
#
# Launch:
#   modal run scripts/modal/train_remote.py --config v0_6_2-crf-fp32-diagnostic.yaml

data:
  corpus_dir: /data/corpus/versioned/v0.4.0/corpus-v0.4.0
  tokenizer_dir: /data/models/tokenizer/v0.6.0-a0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    deepseek-translit-armn: 0.5
    deepseek-translit-cyrl: 0.5
    deepseek-translit-hang: 0.5
    deepseek-translit-hans: 0.5
    deepseek-translit-jpan: 0.5
    synth-po-box: 1.5
    synth-street: 2.0
  train_rows_per_epoch: 1000000
  val_rows: 2048
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  crf_normalization: per_sequence
  # === DIAGNOSTIC PARAMETERS ===
  # The two changes from v0.6.1-stage3-streets.yaml that this experiment isolates.
  crf_loss_weight: 0.5
  crf_fp32: true
  class_weights:
    O: 0.5
    B-country: 2.0
    I-country: 2.0
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v062-crf-diag/checkpoints
  seed: 42
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  # Cap at 3000 — enough to clear both previously-observed NaN windows (step 950
  # and step 1700) with margin. We don't need a full training; we just need to
  # know if the model survives the moment of suspected instability.
  max_steps: 3000
  eval_every_steps: 500
  save_every_steps: 1000
  log_every_steps: 25
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
