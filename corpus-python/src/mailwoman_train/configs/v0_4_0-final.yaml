# v0.4.0 final ship recipe — winner of the stable-LR ablation matrix.
#
# Iteration trail this config closes out:
#   1. lr=5e-4 / 3e-4 / 1.5e-4 with full v0.4.0 (§1 per_token CRF + §3 class_weights
#      + §4 source rebalance) — ALL diverged through warmup + post-warmup.
#   2. lr=5e-4 ablations (ablate-crf, ablate-cw) — both failed → lr=5e-4 itself
#      is unreachable for this codebase, not a single-lever issue.
#   3. Stable-LR matrix at lr=1.5e-4:
#        source-only (§4):     PASS, peak macro_f1=0.4190, plateau 0.4144
#        cw-only    (§3+§4):   PASS, peak macro_f1=0.4279, plateau 0.4243  ← WINNER
#        crf-only   (§1+§4):   FAIL, peak macro_f1=0.4066, plateau 0.3663
#
# Conclusion: §1 per_token CRF NLL × crf_loss_weight=1.0 is a relative destabilizer
# even at v0.3.0-stable LR. §3 class_weights on top of v0.3.0 dual-loss recipe is
# the cleanest gain. Recipe = v0.3.0 base + §3 + §4 at lr=1.5e-4.
#
# Identical to v0_4_0-stableLR-cw-only.yaml in every field EXCEPT:
#   - output_dir: /data/models/checkpoints/v0_4_0-final (smoke checkpoints preserved)
#   - max_steps: 50000 (full schedule; smoke ran 3000 then cosine-tail saturated)
#
# Hand off after this completes:
#   CHECKPOINT=/data/models/checkpoints/v0_4_0-final/step-XXXXX \
#     scripts/ship_v0_4_0.sh
#   (where XXXXX is the best-eval checkpoint; do NOT npm publish per operator rule)

data:
  corpus_dir: /data/corpus/versioned/v0.3.0/corpus-v0.3.0
  tokenizer_dir: /data/models/tokenizer/v0.1.0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
  train_rows_per_epoch: null
  val_rows: 4096
  coarse_filter: true

model:
  hidden_size: 256
  num_hidden_layers: 6
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  # v0.3.0 dual-loss recipe (per_sequence default + crf_loss_weight=0.05).
  crf_loss_weight: 0.05
  # §3 class_weights ON — the v0.4.0 lever that actually helps at safe LR.
  class_weights:
    O: 1.0
    B-country: 2.0
    I-country: 2.0
    B-region: 2.0
    I-region: 2.0
    B-locality: 1.5
    I-locality: 1.5
    B-dependent_locality: 1.5
    I-dependent_locality: 1.5
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 1.5
    I-subregion: 1.5
    B-cedex: 2.0
    I-cedex: 2.0
    B-venue: 0.5
    I-venue: 0.5
    B-street: 0.5
    I-street: 0.5
    B-house_number: 0.5
    I-house_number: 0.5

train:
  output_dir: /data/models/checkpoints/v0_4_0-final
  seed: 42
  batch_size: 32
  eval_batch_size: 40
  grad_accum_steps: 4
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 50000
  eval_every_steps: 250
  save_every_steps: 100
  log_every_steps: 50
  precision: bf16
  num_workers: 2
  csv_log_path: "{output_dir}/train_log.csv"

eval:
  golden_dir: ""
  val_jsonl: ""
