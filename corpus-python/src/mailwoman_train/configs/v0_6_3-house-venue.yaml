# v0.6.3 — Stage 3 corpus rebalance + house_number recovery.
#
# Recipe per DeepSeek turn 8 (2026-05-29) following the v0.6.2/v0.6.2b
# step-20K diagnostic. v0.6.2 fixed dep_locality (1066 → 0) but regressed
# house_number by ~4-5pp via two mechanisms:
#   (a) Direct: digit+ordinal venue templates ("5th Avenue Theatre")
#       confused the model about house_number recognition.
#   (b) Distributional: synth-no-street's 122K house_number-absent rows
#       shifted the training distribution.
#
# v0.6.3 fixes both:
#
#   1. synth-no-street-v063 at weight 0.5 (down from v0.6.2's 1.0)
#      - Adopts v0.6.2b's half-weight (the 20K diagnostic showed half-weight
#        produces fewer collateral regressions while preserving the dep_loc
#        fix).
#      - Rebuilt with `5th Avenue Theatre` and `7th Street Bistro` removed
#        from ADVERSARIAL_VENUES. Module-load-time assertion now rejects any
#        digit+ordinal venue addition (mechanism (a) fix).
#
#   2. NEW synth-house-venue-v063 at weight 1.0 (32K rows)
#      - Companion shard with house_number + venue + street ALL coexisting.
#      - Two templates: "123 Main St, Sunrise Bakery, ..." and
#        "Sunrise Bakery, 123 Main St, ..." (50/50). Plain venue pool only.
#      - Teaches the model that house_number and venue are not mutually
#        exclusive (mechanism (b) fix).
#
#   3. v0.6.2 sources (synth-no-street, synth-house-venue) ARE NOT WEIGHTED.
#      Per data_loader source_weights inclusion semantics, sources missing
#      from this dict are dropped. The v062 shards remain on the volume for
#      reproducibility but are inactive in v0.6.3 training.
#
#   4. synth-street stays at weight 0.5 (v0.6.2's value, preserved). The
#      v0.6.2 20K eval confirmed dep_loc fix at this weight; no reason to
#      revisit.
#
#   5. CRF stays disabled (CE-only). The fp32-CRF diagnostic (2026-05-28)
#      confirmed the precision hypothesis, but enabling CRF in v0.6.3
#      confounds the composition change. v0.6.4 will turn it on.
#
#   6. Training dynamics unchanged: LR 1.5e-4 constant, 1000-step warmup,
#      100K total steps, v0.6.0-a0 tokenizer, bf16 precision.
#
# Early-eval gate at 20K steps: if dep_loc hallucinations > 100, abort
# (composition change has unwound the dep_loc fix). Also check that
# house_number recall is on track ≥ 77% (the recovery we're testing).
#
# Promotion decision tree at 100K:
#
#   | Gate eval | harness pass | Action                       |
#   | --------- | ------------ | ---------------------------- |
#   | Pass      | ≥ 25%        | Promote to default (HF)      |
#   | Pass      | 15-24%       | Ship as experimental         |
#   | Pass      | ≤ 14.4%      | HOLD (sidegrade not release) |
#   | Fail      | any          | HOLD                         |
#
# Cost: ~1h45min on A100 80GB.
#
# Launch:
#   modal run -d scripts/modal/train_remote.py --config v0_6_3-house-venue.yaml

data:
  corpus_dir: /data/corpus/versioned/v0.4.0/corpus-v0.4.0
  tokenizer_dir: /data/models/tokenizer/v0.6.0-a0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    deepseek-translit-armn: 0.5
    deepseek-translit-cyrl: 0.5
    deepseek-translit-hang: 0.5
    deepseek-translit-hans: 0.5
    deepseek-translit-jpan: 0.5
    synth-po-box: 1.5
    # === v0.6.3 corpus changes ===
    # synth-street unchanged from v0.6.2 (the dep_loc fix doesn't need this dial).
    synth-street: 0.5
    # synth-no-street-v063 at half weight (v0.6.2b's setting; better trade-off
    # per the 20K diagnostic). Source name distinct from v0.6.2's
    # `synth-no-street` so the two shards coexist on the volume — the v062
    # source is intentionally omitted from source_weights → dropped per
    # data_loader's inclusion semantics.
    synth-no-street-v063: 0.5
    # NEW: 32K-row companion shard with house_number + venue + street ALL
    # coexisting. Recovers the house_number signal that synth-no-street's
    # distributional shift cost in v0.6.2. Weight 1.0 = full inclusion.
    synth-house-venue-v063: 1.0
  train_rows_per_epoch: 1000000
  val_rows: 2048
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  crf_normalization: per_sequence
  # CE-only per NaN protocol. The fp32-CRF diagnostic (2026-05-28) confirmed
  # the precision hypothesis — enabling CRF here would confound the corpus
  # change. Defer learned CRF transitions to v0.6.3 with crf_fp32=true.
  crf_loss_weight: 0.0
  class_weights:
    O: 0.5
    B-country: 2.0
    I-country: 2.0
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v063/checkpoints
  seed: 42
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 100000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
