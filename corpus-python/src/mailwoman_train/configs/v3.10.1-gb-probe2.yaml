# === v3.10.1-gb-probe2 — dep-loc resurrection PROBE 2: positive-mass at NZ density. 2k PROBE. ===
# Clone of v3.10.0-gb-probe.yaml with ONE variable changed: data.source_weights.synth-gb 6.0 -> 36.0.
# Everything else byte-verbatim (same corpus, same levers, same steps/LR/seed).
#
# WHY PROBE 2 (2026-07-22, operator adjudication): probe 1's 0/246-NZ + 0/69-GB decode-layer read is
# INCONCLUSIVE, not a FAIL — the null-condition was unmet. At synth-gb 6.0 the head saw only ~3.4k
# dep-loc positive rows in 2k steps (6/148 x 32.8% ≈ 1.3% of stream) — each example ~1.7x total.
# Emission-0 only falsifies the dead-tag/output-basin theory when the head is fed ADEQUATE verified
# positive mass and still stays at zero. Probe 1 also confirmed every lever fired ([init_from]
# missing=0; [reinit_label_rows] rows [7,8]; [classifier_learning_rate] 12,705 @ 0.001; rows 7/8
# cosine-to-v385 ~0.10 vs 0.62-0.73 untouched) AND the head is CLIMBING: raw-BIO logit gap
# (winner - B-dependent_locality at gold positions) narrowed GB 7.02->4.61 mean (min 0.657!),
# NZ 7.82->6.35, with first-ever raw-BIO emissions 2/69 GB. Starved + handicapped, not dead.
#
# MEASUREMENT LAYER (the probe-1 scoring bug, now fixed): PRIMARY is scored at RAW BIO argmax
# (channel-off, no heal/bridge/decode) — the production-decode read is SECONDARY. Probe 1's
# original 0/246 was scored at full production decode, which hides sub-margin emission entirely
# ("JSON hides gaps"). Both layers get reported.
#
# PRE-REGISTERED READ (probe 2, written before the numbers exist):
#   PRIMARY  : raw-BIO dependent_locality emission > probe-1 (GB > 2/69; NZ > 0/246) with logit-gap
#              mean further narrowed; TARGET = decode-layer emission > 0 on either board.
#   GUARDS   : golden us/fr within ±0.7pp of v385; digit bare-street-hn flat vs probe-1's 0.902;
#              FR fragment holds; 6 demo presets byte-identical.
#   STOP RULE (two-zeros): if raw-BIO emission is still ~0 at THIS density, the null-condition is
#              MET — no further head iteration. Next moves are upstream (conventions loss-mask /
#              collapse_to_active) or the locality-mapped fallback. Two variables, two zeros = stop.
#
# Launch: modal run -d corpus-python/modal/train_remote.py --config v3.10.1-gb-probe2.yaml --resume none
#
# --- original v3.10.0-gb-probe header follows (provenance retained) ---
# Clone of v3.8.5-latam-8k.yaml (the shipped v385/6.6.0 CA/MX Overture recipe) with EXACTLY the
# deltas below — one-variable discipline, everything else verbatim.
#
# [SUPERSEDED HISTORY — retained for the record, CORRECTED by the probe-2 header above]: the
# "run A = instrument failure" adjudication was WRONG. Runs A and B produced byte-identical
# checkpoints; captured run-B startup logs + rows-7/8 cosine analysis prove every lever fired in
# BOTH runs (sources were already synced before run A). The maxΔ-based "rows unchanged" reading
# used the wrong instrument (element scale ~0.07 at 384 dims; cosine 0.10 vs 0.62-0.73 was the
# truth). Probe 1's real confound was positive-mass starvation + decode-layer scoring.
#
# THE VARIABLES (three, bundled because each alone is a known no-op — #456/#1100 dead-tag history):
#   1. data.corpus_dir -> v0.14.0-gb (v0.13.0-latam base + the new synth-gb-v1 shard, 800k rows,
#      32.8% B-dependent_locality) + data.source_weights.synth-gb (36.0 in THIS probe-2 file; the
#      probe-1 value was 6.0 — see probe-2 header above; other locale-add shards unchanged).
#   2. model.class_weights B-/I-dependent_locality 0.3 -> 1.0. Task 4a's fix made GB actually EMIT
#      the tag in the corpus; a 0.3 downweight on top of a near-zero classifier row is the THIRD
#      suppressor and would mute the very signal this probe is testing.
#   3. train.reinit_label_rows (rows 7/8, mean-of-live re-init) + train.classifier_learning_rate
#      1.0e-3 (a dedicated hot param group on `classifier.` — Adam's update is scale-invariant, so
#      only a real param group moves a baked-negative row; see train.py build_optimizer/
#      reinit_label_rows, #1100 Task 6).
#
# ⚠️ LAUNCH DISCIPLINE: this recipe MUST launch with `--resume none`. `reinit_label_rows` and
# `init_from` both live in the train.py `else` branch of the resume/init_from fork — a `--resume
# auto` run takes the `if resume_from:` branch instead and NEVER evaluates `reinit_label_rows` at
# all (silent no-op, not an error). See train.py L433-456.
#
# init_from: the verified v385 (6.6.0, shipped npm 7.1.0) step-008000 checkpoint. The v3.8.5 config's
# own `output_dir` string (`output-v384-latam-probe-s42`) is a REUSED name from the v384 2k probe —
# do not read it as v385's identity. Verified on the volume 2026-07-22: `modal volume ls
# mailwoman-training /output-v384-latam-probe-s42/checkpoints/` lists step-001000..step-008000 (8
# checkpoints, matching the v3.8.5 recipe's max_steps 8000 / save_every_steps 1000), and
# `/output-v384-latam-probe-s42/model.onnx` + `train_log.csv` are both present at the dir root
# (the exported-and-shipped artifact), corroborating neural-weights-en-us/model-card.json's v385
# provenance (recipe v3.8.5-latam-8k.yaml, init_from v381 step-8000, best_step 8000). No
# `output-v385-*` directory exists on the volume — v385 IS output-v384-latam-probe-s42.
#
# PRE-REGISTERED READ (written before the numbers exist; verbatim from
# docs/superpowers/plans/2026-07-22-en-gb-locale-arc.md Task 7):
#   PRIMARY : dependent_locality emission on the 246-row NZ board + GB board.
#   GUARDS  : golden us/fr noise, digit + FR fragment boards, 6 demo presets byte-identical.
#   FALLBACK: locality-mapped ship, no knob-spinning.
#
# 2k PROBE (not a ship candidate). On PASS: operator decides whether to escalate to 8k. On a
# PRIMARY miss: invoke the pre-registered fallback (locality-mapped) — do not iterate the knobs.
#
# Launch (see probe-2 header above): --config v3.10.1-gb-probe2.yaml --resume none

data:
  corpus_dir: /data/corpus/versioned/v0.14.0-gb/corpus-v0.14.0-gb # DELTA — GB overlay (v0.13.0-latam base + synth-gb-v1, 800k rows, 32.8% B-dependent_locality).
  tokenizer_dir: /data/models/tokenizer/v0.9.0-multisplice
  max_length: 128
  country_weights: # VERBATIM v2.4.1.
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    "NO": 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
    CA: 1.0 # NEW (Overture) — live locality, sidesteps NZ's dead dependent_locality
    MX: 1.0 # NEW (Overture) — BR dropped (0% OA-lineage + SN-garbage numbers)
  source_weights: # v3.1.0 weights + overture-latam (CA/MX/BR, dedicated source so it doesn't dilute the trained EU overture rows) + synth-no-fragment (the ONE new variable); synth-no-street-led ZEROED (its on-disk part predates --exclude-surfaces and is contaminated vs the board — see the overlay note).
    overture-latam: 6.0 # NEW — CA/MX/BR Overture shards. 6.0/~142 ≈ 4.2%, within Fable's ≤5-8% new-mass band. Distinct from  (EU) so EU exposure is untouched.
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 0.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    # PROBE 1: the fragment/autocomplete shard (assay weight — moderate precedent).
    synth-fragment: 6.0
    # #727 T2 NEW — the ONE variable. 12.0 = the targeted-fix precedent (fr-bare-street,
    # si-bare-village, no-street-led are all 12.0). Streets with NO house number + the
    # bare-locality counter.
    synth-fr-fragment: 12.0
    # Track B — the NO house-number-licence lever. 12.0 = the targeted-fix tier
    # (matches fr-fragment). Bare streets + street+number with NO postcode partner, + counters.
    synth-no-fragment: 12.0
    synth-gb: 36.0 # DELTA probe2: 6.0→36.0 — the ONE variable. NZ-density dep-loc mass (36/172 ≈ 21% stream × 32.8% ≈ 6.9% dep-loc rows ≈ 5x probe-1).
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  # #1101 FIX — the delimiter-free augmentation (built+tested, never shipped): an extra comma-stripped
  # copy per row so the model segments street/locality without leaning on the comma. Closes the gauntlet
  # comma-drop INV (White House + FR Rue du Chevaleret). ONE new variable vs v373.
  augment_punct_drop_prob: 0.3
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  # #1104 country-lexicon channel — the dedicated country soft-feed vocabulary (feature_dim 2).
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.4.1.
  hidden_size: 384
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  # #1104 country channel ON — dedicated 2-dim [country_surface, country_ambiguous] soft feed with its
  # own projection + confidence (must equal the lexicon's feature_dim). Default-False elsewhere, so a
  # resume from a pre-country checkpoint stays byte-identical until this flips.
  use_country_anchor: true
  country_feature_dim: 2
  # #1104 homograph-guard SOFTENER — the ONE variable vs v263. Scales the country_ambiguous dim by 0.5
  # before the country_projection (bakes into the exported ONNX; no lexicon/inference change). v263's
  # hard guard (scale 1.0) over-suppressed homograph countries Georgia/Jordan (country-homograph F1
  # 89.8->82.6); softening should recover homograph recall while holding the WOF-admin country win.
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 1.0 # DELTA (0.3 -> 1.0) — the third suppressor: re-init + hot LR are useless under a 0.3 downweight.
    I-dependent_locality: 1.0 # DELTA (0.3 -> 1.0) — see B-dependent_locality above.
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train: # Same-vocab init_from fine-tune off the SHIPPED v385 (fresh optimizer; --resume none on a fresh
  # output_dir honors init_from, weights only).
  output_dir: /data/output-v3101-gb-probe2-s42/checkpoints # DELTA — new output dir for this probe (run B: sources synced, see header).
  seed: 42
  init_from: /data/output-v384-latam-probe-s42/checkpoints/step-008000 # DELTA — the verified v385 (6.6.0) checkpoint. See header for the volume-verification evidence.
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip_norm: 1.0
  max_steps: 2000 # DELTA (8000 -> 2000) — 2k PROBE, not the 8k ship escalation.
  eval_every_steps: 1000
  save_every_steps: 1000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  classifier_learning_rate: 1.0e-3 # DELTA — NEW. The dead-tag resurrection hot param group (#1100 Task 6); see header.
  reinit_label_rows: ["B-dependent_locality", "I-dependent_locality"] # DELTA — NEW. Mean-of-live re-init of the baked-dead rows; REQUIRES init_from AND --resume none (see header).
  trackio_project: mailwoman
  trackio_run_name: v3.10.1-gb-probe2-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
