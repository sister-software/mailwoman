# === v3.4.0-norway-coverage-probe — 2k PROBE. Does un-dropping Norway (#1145) fix the Norwegian rows? ===
#
# THE ONE VARIABLE vs SHIPPED v310: Norway is now in the training mix. v310 (and every model since
# v1.9.0) trained on ZERO Norwegian rows — `country_weights: NO: 1.0` parsed to the YAML boolean
# `false`, so `country_weights.get("NO")` missed and the loader dropped all 25k Norwegian rows
# (#1145). This config is v310's EXACT recipe with that key now quoted (fixed on main), so Norway
# flows: ~4.2% of the corpus, including the synth-no-street-led shard (weight 12.0) that has never
# contributed a row. init_from v310, 2k, to see if coverage alone moves the needle fast.
#
# WHY IT MATTERS: the deepparse rematch (scratchpad/deepparse-cmp/REMATCH-after-trackb.md) showed two
# of four contextful house_number losses are Norwegian rows the model simply never saw — the street
# reads as a LOCALITY (B0's unseen-street signature):
#     Epleskogen 39A        -> locality "Epleskogen" + postcode 39A     (should be street + hn)
#     Tindvegen nedre 44B   -> locality "Tindvegen" + street "nedre"    (should be street + hn)
#
# PRE-REGISTERED READ (written before the numbers exist):
#   PRIMARY (the operator's question) — the brief's Norwegian rows: does the STREET stop reading as a
#     locality? `Epleskogen 39A` / `Tindvegen nedre 44B` -> street, not locality. If the street reads
#     correctly, coverage is the fix and an 8k run (init_from v264, full recipe) becomes a ship
#     candidate. If the street STILL reads as locality after 2k of Norway-inclusive training, either
#     coverage alone is insufficient OR 2k off v310 cannot overwrite the "never saw Norway" prior —
#     escalate to init_from v264 full recipe before concluding.
#   SECONDARY — the NO digit board (board 3). CAVEAT: synth-no-street-led's on-disk part predates its
#     own --exclude-surfaces (#1145) and is contaminated vs the board, so its three street-led classes
#     will read inflated — do NOT treat board-3 street-led movement as generalization. bare-street-hn
#     (a form no-street-led never emits) and bare-pc (the negative class) are the clean cells.
#   GUARD — the FR fragment board (board 2) and global parity must HOLD. Norway coverage must not be
#     bought by trading away the fr-fragment win or the broad corpus.
#
# NOT A SHIP. A PASS justifies the 8k run (init_from v264 = "what v310 would have been with the bug
# fixed"), pre-registered against the same rows. Promotion is the operator's act.
#
# Launch: modal run -d corpus-python/modal/train_remote.py --config v3.4.0-norway-coverage-probe.yaml --resume none

data:
  corpus_dir: /data/corpus/versioned/v0.10.9-fr-fragment/corpus-v0.10.9-fr-fragment
  tokenizer_dir: /data/models/tokenizer/v0.9.0-multisplice
  max_length: 128
  country_weights: # VERBATIM v2.4.1.
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    "NO": 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
  source_weights: # VERBATIM v2.4.1 + the one new assay shard.
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 12.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    # PROBE 1: the fragment/autocomplete shard (assay weight — moderate precedent).
    synth-fragment: 6.0
    # #727 T2 NEW — the ONE variable. 12.0 = the targeted-fix precedent (fr-bare-street,
    # si-bare-village, no-street-led are all 12.0). Streets with NO house number + the
    # bare-locality counter.
    synth-fr-fragment: 12.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  # #1104 country-lexicon channel — the dedicated country soft-feed vocabulary (feature_dim 2).
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.4.1.
  hidden_size: 384
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  # #1104 country channel ON — dedicated 2-dim [country_surface, country_ambiguous] soft feed with its
  # own projection + confidence (must equal the lexicon's feature_dim). Default-False elsewhere, so a
  # resume from a pre-country checkpoint stays byte-identical until this flips.
  use_country_anchor: true
  country_feature_dim: 2
  # #1104 homograph-guard SOFTENER — the ONE variable vs v263. Scales the country_ambiguous dim by 0.5
  # before the country_projection (bakes into the exported ONNX; no lexicon/inference change). v263's
  # hard guard (scale 1.0) over-suppressed homograph countries Georgia/Jordan (country-homograph F1
  # 89.8->82.6); softening should recover homograph recall while holding the WOF-admin country win.
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train: # Same-vocab init_from fine-tune off the SHIPPED v261 (fresh optimizer; --resume none on a fresh
  # output_dir honors init_from, weights only). The new country_projection starts random and learns to
  # route the cue; the encoder keeps v261's span-boundary + street grammar.
  output_dir: /data/output-v340-norway-coverage-probe-s42/checkpoints
  seed: 42
  init_from: /data/output-v310-fr-fragment-s42/checkpoints/step-008000
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 200
  grad_clip_norm: 1.0
  max_steps: 2000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v3.1.0-fr-fragment-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
