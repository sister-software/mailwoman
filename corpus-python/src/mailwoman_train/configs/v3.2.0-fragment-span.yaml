# === v3.2.0-fragment-span — #1143. ONE variable vs v310: the span head. THE DECIDING RUN. ===
#
# WHY THIS RUN EXISTS. The span-head arc's ship case died on a measurement, not an opinion. Paris
# target class (n=63, production config, int8):
#     v264 token@1 (shipped)              33/63 = 0.524
#     v301 seg@1   (the flag's whole case) 48/63 = 0.762   <- "+23.8pp", the reason to ship a flag
#     v310 token@1 (the SHARD, no span head) 56/63 = 0.889 <- a PLAIN decode, +36.5pp
# The span decode is 12.7pp WORSE on its own target class than the shard's plain token decode. So the
# flag ships nothing: an opt-in path that loses to the default is not a feature. §6 of the review
# (2026-07-16-span-head-arc-review-follow-up.md) said "ship behind a flag" on the belief that the
# span decode owned that class. T1c + T2 falsified the belief.
#
# BUT THE COMPARISON IS BETWEEN ARTIFACTS, NOT DECODES. v301's span head was trained on the OLD, THIN
# corpus — the exact distribution T1c named as the cause and T2 replaced. T1a diagnosed the span
# decode as MISCALIBRATED (over-eager to emit/extend a street segment: 19/54 street-free rows got a
# street vs the shipped 12/54); T1c showed the BIO head carried the SAME miscalibration from the
# other side; T2 fixed it at the distribution and the BIO side recovered (bare-locality HELD at
# 0.980, contextful guards IMPROVED). Nobody has ever trained a span head on a corpus that teaches
# bare streets. THIS RUN IS THAT, and it is the only remaining question the arc can ask.
#
# THE ONE CHANGE vs v3.1.0-fr-fragment: model.use_span_scorer true, span_loss_weight 0.5, span_dim
# 128, max_span 8, and train.span_head_learning_rate 1e-3 (a FRESH head cannot train at a pretrained
# encoder's fine-tuning LR — the #727 Phase-1 lesson that cost a run). Corpus, tokenizer, lexicons,
# class_weights, country_weights, every source_weight incl. synth-fr-fragment 12.0, encoder LR, and
# schedule are VERBATIM v310. init_from v310 step-008000. Clean attribution.
#
# THE GATE (pre-registered, and the bar is HIGHER than the flag ever had to clear):
#   1. PARIS, THE KILL SHOT: seg@1 must beat v310's token@1 = 56/63 (0.889). This is the bar the flag
#      FAILED. If a shard-trained span head cannot beat a shard-trained plain decode on the target
#      class, the span head has no case at any weight and the arc closes.
#   2. HALLUCINATION: parity.street.hallucination_rate on the 54 street-free rows must fall from
#      v301-span's 0.352 toward v264's 0.222. T1a's falsifier. Note the rate was never ESTABLISHED
#      (McNemar p=0.12, n=54) — direction is the read, not significance.
#   3. WITHIN-MODEL MARGIN: seg@1 must beat THIS model's own token@1 by more than v301's honest
#      +0.38pp (1 fixture, production config). That is the decode's real marginal value.
#   4. GUARD: the fragment board's 7 cells vs V310 (not v264) — bare-street 0.715, particle 0.855,
#      homonym 0.517, date-name 0.158, street-hn 0.948, alnum 0.960, bare-locality 0.980.
#   5. GUARD: the v6.0.0-shipped-baseline gate. ⚠ v310's TIGHTEST margin is arena.perturb 79 vs floor
#      78 (+1.0pp) — a span head could push it under, and now the floor would actually catch it.
#
# IF 1 FAILS: the span head is DONE. Close it, do not flag it, do not tune span_loss_weight and
# re-run — that is the treadmill the arc's own guard forbids. The four phases still paid for
# themselves: oracle@k and the k-best decode are the instruments that REVEALED the headroom and drove
# T1a -> T1c -> T2. The arc found the answer; the answer was data.
#
# ⚠ conventions loss-mask: OFF in this lineage (inherited). Do not turn it on — the shard teaches FR
# street_prefix and the mask would -inf those labels (the v1.6.0 ~7M-loss blow-up).
#
# fp32 partition math is enforced inside span_scorer.py regardless of autocast (the v0.5.0 bf16 CRF
# NaN scar applies to this exact arithmetic). Measured cost: +29% step time.
#
# Launch: modal run -d corpus-python/modal/train_remote.py --config v3.2.0-fragment-span.yaml --resume none
data:
  corpus_dir: /data/corpus/versioned/v0.10.9-fr-fragment/corpus-v0.10.9-fr-fragment
  tokenizer_dir: /data/models/tokenizer/v0.9.0-multisplice
  max_length: 128
  country_weights: # VERBATIM v2.4.1.
    US: 1.0
    FR: 1.0
    DE: 1.0
    ES: 1.0
    IT: 1.0
    NL: 1.0
    PT: 1.0
    BE: 1.0
    PL: 1.0
    AT: 1.0
    CH: 1.0
    CZ: 1.0
    DK: 1.0
    NO: 1.0
    SE: 1.0
    FI: 1.0
    IE: 1.0
    GB: 1.0
    SK: 1.0
    SI: 1.0
    HR: 1.0
    HU: 1.0
    AU: 1.0
  source_weights: # VERBATIM v2.4.1 + the one new assay shard.
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    synth-intersection: 1.0
    synth-german: 6.0
    synth-fr-order: 3.0
    synth-fr-admin-split: 6.0
    synth-unit: 1.5
    synth-po-box-cedex: 1.5
    synth-affix: 2.0
    synth-country: 2.0
    overture: 3.0
    gnaf: 6.0
    synth-anchor-absorption: 6.0
    synth-fr-bare-street: 12.0
    synth-si-bare-village: 12.0
    synth-no-street-led: 12.0
    synth-cz-pcfirst-preposition: 12.0
    synth-nl-postcode: 6.0
    # PROBE 1: the fragment/autocomplete shard (assay weight — moderate precedent).
    synth-fragment: 6.0
    # #727 T2 NEW — the ONE variable. 12.0 = the targeted-fix precedent (fr-bare-street,
    # si-bare-village, no-street-led are all 12.0). Streets with NO house number + the
    # bare-locality counter.
    synth-fr-fragment: 12.0
  train_rows_per_epoch: 1000000
  val_rows: 4096
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3
  augment_glue_prob: 0.25
  anchor_lookup_path: /data/anchor/pilot-anchor-lookup.json
  gazetteer_lexicon_path: /data/gazetteer/anchor-lexicon-v1.json
  # #1104 country-lexicon channel — the dedicated country soft-feed vocabulary (feature_dim 2).
  country_lexicon_path: /data/gazetteer/country-surface-lexicon-v1.json
  gazetteer_choreography: true
  affix_relabel_lexicon_path: /data/gazetteer/affix-relabel-lexicon-v1.json
  anchor_paint_mode: shaped
  anchor_value_mode: posterior_latlon

model: # VERBATIM v2.4.1.
  hidden_size: 384
  use_span_boundary_head: true
  span_boundary_loss_weight: 0.5
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  crf_loss_weight: 0.0
  crf_normalization: per_sequence
  label_smoothing: 0.1
  use_locale_conditioning: true
  locale_loss_weight: 0.3
  use_postcode_anchor: true
  use_gazetteer_anchor: true
  gazetteer_feature_dim: 5
  # #1104 country channel ON — dedicated 2-dim [country_surface, country_ambiguous] soft feed with its
  # own projection + confidence (must equal the lexicon's feature_dim). Default-False elsewhere, so a
  # resume from a pre-country checkpoint stays byte-identical until this flips.
  use_country_anchor: true
  country_feature_dim: 2
  # #1104 homograph-guard SOFTENER — the ONE variable vs v263. Scales the country_ambiguous dim by 0.5
  # before the country_projection (bakes into the exported ONNX; no lexicon/inference change). v263's
  # hard guard (scale 1.0) over-suppressed homograph countries Georgia/Jordan (country-homograph F1
  # 89.8->82.6); softening should recover homograph recall while holding the WOF-admin country win.
  country_ambiguous_scale: 0.5
  class_weights:
    O: 0.5
    B-country: 3.5
    I-country: 3.5
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10
  # #1143 THE ONE VARIABLE vs v310: the semi-Markov span scorer. Knobs VERBATIM v3.0.1 (the probe
  # that passed its gate). fp32 partition math is enforced inside span_scorer.py.
  use_span_scorer: true
  span_loss_weight: 0.5
  span_dim: 128
  max_span: 8

train: # Same-vocab init_from fine-tune off the SHIPPED v261 (fresh optimizer; --resume none on a fresh
  # output_dir honors init_from, weights only). The new country_projection starts random and learns to
  # route the cue; the encoder keeps v261's span-boundary + street grammar.
  output_dir: /data/output-v320-fragment-span-s42/checkpoints
  seed: 42
  init_from: /data/output-v310-fr-fragment-s42/checkpoints/step-008000
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.0e-5
  # A FRESH head cannot train at the encoder's fine-tuning LR — #727 Phase 1 spent a whole run
  # learning that. Its own param group, VERBATIM v3.0.1.
  span_head_learning_rate: 1.0e-3
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip_norm: 1.0
  max_steps: 8000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant
  gazetteer_curriculum: false
  trackio_project: mailwoman
  trackio_run_name: v3.2.0-fragment-span-s42

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
