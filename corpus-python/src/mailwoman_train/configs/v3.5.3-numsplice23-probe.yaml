# === v3.5.3-numsplice23-probe — B4c RANGE REFINEMENT: 2+3-digit vocab splice (10-999). 2k PROBE. ===
#
# THE ONE VARIABLE vs v3.5.2-numsplice3-probe: the splice RANGE adds the 2-digit pieces. v0.11.2-
# numsplice23 adds word-start 10-999 (+988) vs numsplice3's 100-999 (+900). So `11` -> `▁11` (the
# FR date-name DAY win the 3-digit cut forgoes) and `178` -> `▁178`, while `1945`/`6000`/`90210`
# STAY multi-piece (`▁194,5` / `▁600,0` / `▁902,1,0`). English letters byte-identical.
#
# WHY. The 3-digit probe (v352) CONFIRMED the guard: parity postcode held at 0.986 (0 regressions) vs
# the full range's 0.889 (-9.7pp) — the cost was carried entirely by the 4-5 digit pieces. But 3-digit
# forgoes half the FR date-name win (0.367 vs the full range's 0.682) because date streets carry 2-digit
# days (`11 Novembre`) and 4-digit years, and 100-999 splices neither. 2-digit pieces (10-99) CANNOT
# collide with a 4-5 digit postcode, so adding them should recover the date-name 2-digit half while
# keeping the postcode guard clean. This probe tests whether 10-999 STRICTLY DOMINATES 100-999.
# (scratchpad/deepparse-cmp/NUMSPLICE3-verdict.md has the full v352 read.)
#
# init_from /data/models/numsplice23-expanded (v310 step-008000, token_embeddings FVT mean-init'd to
# 74,131 — each 10-999 row = mean of its digit constituents; encoder/heads byte-identical).
#
# PRE-REGISTERED READ:
#   PRIMARY (must at least MATCH v352) — board 3 bare-street-hn near v352's 0.787; `aleja Wojska
#     Polskiego 178` -> house_number; contextful classes hold at v352's recovered levels.
#   THE 2-DIGIT WIN (the reason to prefer 10-999) — FR date-name rises ABOVE v352's 0.367 toward the
#     full range's 0.682. If it does NOT, the 2-digit pieces buy nothing and 3-digit is the cut.
#   GUARD (must HOLD) — parity postcode holds at ~0.986 (as v352 did); board 3 bare-pc holds; the 6
#     demo presets hold. If postcode drops, a 2-digit piece IS colliding — unexpected; 3-digit is the cut.
#   DO-NO-HARM — FR fragment OVERALL + global parity hold.
#
# DECISION TABLE:
#   guard HOLDS + date-name UP -> 10-999 dominates; take THIS to 8k, then promote.
#   guard HOLDS + date-name FLAT -> 2-digit buys nothing; take 100-999 (v352) to 8k instead.
#   guard DROPS -> a 2-digit piece collides (unexpected); fall back to 100-999 (v352).
#
# NOT A SHIP. A PASS justifies an 8k. Promotion is the operator's act.
# Launch: modal run -d corpus-python/modal/train_remote.py --config v3.5.3-numsplice23-probe.yaml --resume none

