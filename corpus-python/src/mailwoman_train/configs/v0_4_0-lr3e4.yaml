# v0.4.0 bisected: lr 5.0e-4 → 3.0e-4 — issue #116 fallback instruction.
#
# Direct branch from v0_4_0.yaml after the first attempt diverged through warmup:
#
#   step 500  val_loss=2.12  macro_f1=0.36   (best window)
#   step 750  val_loss=3.39  macro_f1=0.14   (eval crash; LR @ 3.75e-4 of warmup ramp)
#
# Issue #116 prescribes the bisection explicitly: "If divergence recurs by step 2000,
# bisect down to 3e-4 first; v0.3.0's 1.5e-4 was only safe because crf_loss_weight=0.05
# masked the dual-loss instability the per-token norm fixes." Divergence happened
# earlier than 2K — implementation note: warmup ramp through ~3.75e-4 was already
# enough to destabilize, so 3.0e-4 should land below that.
#
# Separate output_dir so the bisect doesn't trample the step-500 checkpoint from the
# first attempt — that's the current best-eval artifact if 3.0e-4 also diverges and
# we have to fall back further (1.5e-4 next).
#
# Everything else from v0_4_0.yaml is intentionally unchanged: same corpus, same
# source_weights, same class_weights, same per_token CRF norm. Only the LR moves.

data:
  corpus_dir: /data/corpus/versioned/v0.3.0/corpus-v0.3.0
  tokenizer_dir: /data/models/tokenizer/v0.1.0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
  train_rows_per_epoch: null
  val_rows: 4096
  coarse_filter: true

model:
  hidden_size: 256
  num_hidden_layers: 6
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  crf_normalization: per_token
  crf_loss_weight: 1.0
  class_weights:
    O: 1.0
    B-country: 2.0
    I-country: 2.0
    B-region: 2.0
    I-region: 2.0
    B-locality: 1.5
    I-locality: 1.5
    B-dependent_locality: 1.5
    I-dependent_locality: 1.5
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 1.5
    I-subregion: 1.5
    B-cedex: 2.0
    I-cedex: 2.0
    B-venue: 0.5
    I-venue: 0.5
    B-street: 0.5
    I-street: 0.5
    B-house_number: 0.5
    I-house_number: 0.5

train:
  # Separate dir so the lr=5e-4 step-500 checkpoint is preserved if this bisect also
  # diverges and we need to fall back further (1.5e-4).
  output_dir: /data/models/checkpoints/v0_4_0-lr3e4
  seed: 42
  batch_size: 32
  eval_batch_size: 40
  grad_accum_steps: 4
  # Bisected from 5.0e-4. v0.3.0's 1.5e-4 is the proven-safe floor; 3.0e-4 is the
  # midpoint that the issue specifically calls out as the next attempt.
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 50000
  eval_every_steps: 250
  save_every_steps: 100
  log_every_steps: 50
  precision: bf16
  num_workers: 2
  csv_log_path: "{output_dir}/train_log.csv"

eval:
  golden_dir: ""
  val_jsonl: ""
