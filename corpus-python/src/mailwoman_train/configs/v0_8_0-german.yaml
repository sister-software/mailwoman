# v0.8.0 — German coverage (continue-train from v0.7.2, night-shift 2026-06-02, DE-3).
#
# The model is out-of-distribution on German: it truncates `Straußstraße`→`Strau`, absorbs the
# house number into the street, and mis-tags the native-order house number as a postcode. DE-0
# confirmed the tokenizer round-trips German orthography cleanly, so this is a COVERAGE gap (ORDER:
# the model trained US+FR — house-number-FIRST, postcode-AFTER-city — and never saw German order:
# house-number-AFTER-street, postcode-BEFORE-city).
#
# SINGLE VARIABLE vs v0_7_2-intersection-bare.yaml: add `synth-german: 0.2` (real OpenAddresses
# Berlin/Saxony tuples rendered German-order via the OpenCage DE template) + `DE: 1.0` to
# country_weights (REQUIRED — the loader rejects rows whose country isn't weighted). Synthesis-as-
# supplement discipline: weight < 0.25, one-and-done.
#
# CONTINUE-TRAIN: same output_dir as v0.7.2 (resume=auto from step-100000) → +40k steps to 140000 at
# constant LR. v0.7.2's step-100000 is immutable and preserved; the German model is step-140000.
#
# Baseline German per-locale F1 (v0.7.2, OOD): street 19.1%, house_number 14.6%, locality 72.5%,
# postcode 89.0%. Hypothesis: street + house_number jump; US/FR within ~1pp (interference tripwire);
# German resolver coord holds. Revert if any existing locale drops > 1pp.
#
# Launch:
#   modal run -d scripts/modal/train_remote.py --config v0_8_0-german.yaml --resume auto

data:
  corpus_dir: /data/corpus/versioned/v0.4.0/corpus-v0.4.0
  tokenizer_dir: /data/models/tokenizer/v0.6.0-a0
  max_length: 128
  country_weights:
    US: 1.0
    FR: 1.0
    DE: 1.0 # REQUIRED — the loader rejects any row whose country isn't weighted (data_loader.py:164)
  source_weights:
    wof-admin: 2.0
    wof-postalcode: 2.0
    ban: 3.0
    tiger: 4.0
    usgov-nppes: 2.0
    usgov-hrsa-fqhc: 2.0
    usgov-imls-pls: 2.0
    usgov-nad: 1.0
    state-ia-contractors: 2.0
    state-tx-notaries: 1.5
    state-ny-notaries: 2.0
    deepseek-kryptonite: 3.0
    deepseek-translit-armn: 0.5
    deepseek-translit-cyrl: 0.5
    deepseek-translit-hang: 0.5
    deepseek-translit-hans: 0.5
    deepseek-translit-jpan: 0.5
    synth-po-box: 1.5
    synth-intersection: 0.2
    synth-german: 0.2
  train_rows_per_epoch: 1000000
  val_rows: 2048
  coarse_filter: true
  augment_directional_prob: 0.3
  augment_region_prob: 0.3

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 128
  type_vocab_size: 1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_crf: true
  label_smoothing: 0.0
  crf_normalization: per_sequence
  crf_loss_weight: 0.0
  class_weights:
    O: 0.5
    B-country: 2.0
    I-country: 2.0
    B-region: 1.5
    I-region: 1.5
    B-locality: 2.0
    I-locality: 2.0
    B-dependent_locality: 0.3
    I-dependent_locality: 0.3
    B-postcode: 1.5
    I-postcode: 1.5
    B-subregion: 0.3
    I-subregion: 0.3
    B-cedex: 1.0
    I-cedex: 1.0
    B-venue: 1.5
    I-venue: 1.5
    B-street: 2.0
    I-street: 2.0
    B-house_number: 1.5
    I-house_number: 1.5
    B-street_prefix: 1.5
    I-street_prefix: 1.5
    B-street_suffix: 1.5
    I-street_suffix: 1.5
    B-unit: 1.5
    I-unit: 1.5
    B-po_box: 1.5
    I-po_box: 1.5
    B-intersection_a: 1.0
    I-intersection_a: 1.0
    B-intersection_b: 1.0
    I-intersection_b: 1.0
  use_phrase_priors: true
  phrase_feature_dim: 10

train:
  output_dir: /data/output-v072-intersection/checkpoints
  seed: 42
  batch_size: 128
  eval_batch_size: 128
  grad_accum_steps: 1
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip_norm: 1.0
  max_steps: 140000
  eval_every_steps: 2000
  save_every_steps: 2000
  log_every_steps: 50
  precision: bf16
  num_workers: 0
  csv_log_path: "{output_dir}/../train_log.csv"
  lr_schedule: constant

eval:
  golden_dir: /data/eval/golden/v0.1.2
  val_jsonl: ""
