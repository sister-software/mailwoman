# Pre-defined tags for Mailwoman documentation.
# Each tag listed here can be used in frontmatter as `tags: [key]`.
# Tags NOT listed here will trigger the onInlineTags behavior (warn by default).

#region Category

domain:
  label: Domain
  description: Articles explaining the address-parsing problem space — why addresses are hard, how the postal system works, what users actually type.

architecture:
  label: Architecture
  description: Articles describing Mailwoman's staged pipeline design, the Knowledge Ladder, and how the stages compose.

concepts:
  label: Concepts
  description: Technical deep dives into specific components of Mailwoman's system.

reference:
  label: Reference
  description: Glossaries, overviews, historical bridges, and implementation-plan material.

hubris:
  label: Geocoder hubris
  description: Articles examining geocoder overconfidence — why 90% coverage isn't enough, why Google's API and geocode.earth have ceilings.

falsehoods:
  label: Address falsehoods
  description: Articles cataloguing the falsehoods programmers believe about addresses, citing Michael Tandy's original catalogue.

retrospective:
  label: Retrospective
  description: Post-mortems of incidents, bugs, and failures — what happened, why, and how it was fixed.

geocoding:
  label: Geocoding
  description: Articles about geocoding — the process of turning parsed addresses into lat/lon coordinates.

geocoder:
  label: Geocoder
  description: Articles about Mailwoman as a calibrated street-level geocoder — resolving a messy address line to a coordinate, a resolution tier, and a calibrated uncertainty.

record-matching:
  label: Record matching
  description: Articles about geocode-first entity resolution — correlating and deduplicating fragmented records by the resolved place rather than the address string.

infrastructure:
  label: Infrastructure
  description: Articles about the training-data pipeline, model training, tokenization, and other non-model components.

beginner:
  label: Beginner-friendly
  description: Articles that assume no prior knowledge of AI, machine learning, or geocoding — ideal for newcomers.

advanced:
  label: Advanced
  description: Articles that dive deep into technical details, diagnostics, and design decisions — ideal for experienced practitioners.

night-shift:
  label: Night shift
  description: Articles about the night shift debugging sessions — Problems. Process. Outcomes.

record-matching:
  label: Record matching
  description: Articles about the record-matching problem — how to match parsed addresses to gazetteer records, and how to score those matches.

#endregion

#region Classification

rule-based:
  label: Rule-based classifiers
  description: Articles about regex, dictionary, and heuristic classifiers inherited from Pelias and Mailwoman v1.

neural:
  label: Neural classifier
  description: Articles about the encoder-only transformer model, BIO labeling, ONNX runtime, and training.

hybrid:
  label: Rule + neural hybrid
  description: Articles about the coexistence of rule classifiers and the neural model through the policy registry.

staged-pipeline:
  label: Staged pipeline
  description: Articles about the six-stage runtime pipeline and the Knowledge Ladder decomposition.

stage-3:
  label: Stage 3 (extended schema)
  description: Articles about Knowledge Ladder Stage 3 — the 33-label extended schema (PO box, unit, street affixes, intersections).

resolver:
  label: Resolver / WOF
  description: Articles about the Who's On First gazetteer, concordance scoring, and resolver candidate ranking.

wof:
  label: Who's On First
  description: Articles about the Who's On First gazetteer dataset — IDs, place hierarchies, concordance, and WOF-derived data products.

parsing:
  label: Parsing
  description: Articles about the core parsing problem — segmenting raw address text into labeled components via rule-based and neural stages.

#endregion

#region Infrastructure

corpus:
  label: Corpus pipeline
  description: Articles about the training-data pipeline — adapters, alignment, synthesis, Parquet shards.

training:
  label: Model training
  description: Articles about training runs, loss recipes, verdict smokes, and divergence diagnostics.

tokenizer:
  label: Tokenization
  description: Articles about SentencePiece tokenization, byte-fallback, and multi-script handling.

#endregion

#region Phrase

street:
  label: Street components
  description: Articles focused on street names, building numbers, street suffixes, and intersection addresses.

locality:
  label: Locality components
  description: Articles focused on cities, towns, neighborhoods, boroughs, and administrative place names.

postcode:
  label: Postcode components
  description: Articles focused on ZIP codes, postcodes, postal routing codes, and their formats.

region:
  label: Region components
  description: Articles focused on states, provinces, départements, and first-level administrative divisions.

country:
  label: Country components
  description: Articles focused on sovereign states, territories, and country-level addressing conventions.

venue:
  label: Venue / POI
  description: Articles about venue names, points of interest, organizations, and the venue-vs-address ambiguity problem.

intersection:
  label: Intersection addresses
  description: Articles about crossing-street addresses and street-pair location descriptions.

#endregion

#region Locale

en-us:
  label: United States (en-US)
  description: Articles with US-specific content — ZIP codes, USPS delivery, NAD, TIGER, state abbreviations.

fr-fr:
  label: France (fr-FR)
  description: Articles with France-specific content — BAN, CEDEX, arrondissements, French addressing conventions.

ja-jp:
  label: Japan (ja-JP)
  description: Articles discussing Japanese addressing — block-based numbering, no streets, chōme/banchi/gō, Phase 6 planning.

japan:
  label: Japan
  description: Articles discussing Japanese addressing conventions — block numbering, chōme/banchi/gō, and the no-street grid.

locale:
  label: Locale-specific
  description: Articles about locale-specific addressing conventions and the per-country rules that shape parsing.

international:
  label: International
  description: Articles about non-US addressing — comparative postcode systems, global gazetteers, locale-specific formats.

#endregion

#region Language

multilingual:
  label: Multilingual
  description: Articles about addresses in multiple languages, mixed-language input, and locale detection.

non-latin:
  label: Non-Latin scripts
  description: Articles about CJK, Cyrillic, Arabic, Hangul, and other non-Latin address formats.

#endregion

#region Evaluation

eval:
  label: Evaluation harness
  description: Articles about specific evaluation rigs, test sets, and harnesses built to measure model or resolver correctness.

evaluation:
  label: Evaluation
  description: Articles about evaluating model and system performance — how results are measured, reported, and interpreted.

methodology:
  label: Methodology
  description: Articles examining how Mailwoman defines and measures success — metric design, scoring philosophy, and what makes a test honest.

coordinate-first:
  label: Coordinate-first scoring
  description: Articles about scoring resolver outputs by geographic distance rather than name equality — the shift from label matching to spatial grounding.

#endregion

#region Theme

motivation:
  label: Project motivation
  description: Articles making the case for Mailwoman — why neural, why TypeScript, why a staged pipeline.

#endregion

browser:
  label: Browser
  description: Articles about running Mailwoman entirely in the browser — WASM, WebGPU, sql.js-httpvfs, and the client-side demo.

fst:
  label: FST
  description: Articles about the finite-state-transducer gazetteer that ships to the browser for fast locality matching.

demo:
  label: Demo
  description: Articles about the public client-side geocoder demo and the assets that power it.
