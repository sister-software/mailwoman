# Pre-defined tags for Mailwoman documentation — the single registry shared by
# the docs plugin, the blog (research/), and the glossary plugin.
# Each tag listed here can be used in frontmatter as `tags: [key]` and in
# glossary entries as `"tags": ["key"]` (first tag = primary category).
# Tags NOT listed here FAIL THE BUILD: docs + blog via `onInlineTags: "throw"`
# (docusaurus.config.ts), glossary via plugins/glossary/plugin.ts.

#region Category

domain:
  label: Domain
  description: The address-parsing problem space — why addresses are hard, how postal systems work, what users actually type.

architecture:
  label: Architecture
  description: Mailwoman's design — the staged pipeline, the Knowledge Ladder, schemas, and how the pieces compose.

concepts:
  label: Concepts
  description: Technical deep dives into specific components of Mailwoman's system.

reference:
  label: Reference
  description: Glossaries, overviews, historical bridges, and implementation-plan material.

hubris:
  label: Geocoder hubris
  description: Geocoder overconfidence — why 90% coverage isn't enough, why Google's API and geocode.earth have ceilings.

falsehoods:
  label: Address falsehoods
  description: The falsehoods programmers believe about addresses, citing Michael Tandy's original catalogue.

retrospective:
  label: Retrospective
  description: Post-mortems and failure reports — what happened, why, and how it was fixed.

geocoding:
  label: Geocoding
  description: Turning parsed addresses into coordinates — cascades, precision tiers, and the reference datasets behind them.

evals:
  label: Evaluation
  description: Measuring the parser — metrics, golden sets, parity scorecards, calibration, and eval discipline.

infrastructure:
  label: Infrastructure
  description: The machinery around the model — compute, storage formats, runtimes, and tooling.

night-shift:
  label: Night shift
  description: The night shift debugging sessions — Problems. Process. Outcomes.

#endregion

#region Classification

rule-based:
  label: Rule-based classifiers
  description: Regex, dictionary, and heuristic classifiers inherited from Pelias and Mailwoman v1.

neural:
  label: Neural classifier
  description: The encoder-only transformer model — architecture, BIO labeling, decoding, and inference.

hybrid:
  label: Rule + neural hybrid
  description: Rule classifiers and the neural model coexisting — the policy registry, FST priors, and shallow fusion.

staged-pipeline:
  label: Staged pipeline
  description: The six-stage runtime pipeline and the Knowledge Ladder decomposition.

resolver:
  label: Resolver / WOF
  description: The Who's On First gazetteer, concordance scoring, and resolver candidate ranking.

record-matching:
  label: Record matching
  description: The geocode-first record matcher — blocking, scoring, clustering, and entity resolution.

#endregion

#region Infrastructure

corpus:
  label: Corpus pipeline
  description: The training-data pipeline — adapters, alignment, synthesis, Parquet shards.

training:
  label: Model training
  description: Training runs, loss recipes, verdict smokes, and divergence diagnostics.

tokenizer:
  label: Tokenization
  description: SentencePiece tokenization, byte-fallback, and multi-script handling.

#endregion

#region Phrase

street:
  label: Street components
  description: Street names, building numbers, street suffixes, and intersection addresses.

locality:
  label: Locality components
  description: Cities, towns, neighborhoods, boroughs, and administrative place names.

postcode:
  label: Postcode components
  description: ZIP codes, postcodes, postal routing codes, and their formats.

region:
  label: Region components
  description: States, provinces, départements, and first-level administrative divisions.

country:
  label: Country components
  description: Sovereign states, territories, and country-level addressing conventions.

venue:
  label: Venue / POI
  description: Venue names, points of interest, organizations, and the venue-vs-address ambiguity problem.

intersection:
  label: Intersection addresses
  description: Crossing-street addresses and street-pair location descriptions.

#endregion

#region Locale

en-us:
  label: United States (en-US)
  description: US-specific content — ZIP codes, USPS delivery, NAD, TIGER, state abbreviations.

fr-fr:
  label: France (fr-FR)
  description: France-specific content — BAN, CEDEX, arrondissements, French addressing conventions.

ja-jp:
  label: Japan (ja-JP)
  description: Japanese addressing — block-based numbering, no streets, chōme/banchi/gō, Phase 6 planning.

international:
  label: International
  description: Non-US addressing — comparative postcode systems, global gazetteers, locale-specific formats.

#endregion

#region Language

multilingual:
  label: Multilingual
  description: Addresses in multiple languages, mixed-language input, and locale detection.

non-latin:
  label: Non-Latin scripts
  description: CJK, Cyrillic, Arabic, Hangul, and other non-Latin address formats.

#endregion

#region Theme

motivation:
  label: Project motivation
  description: The case for Mailwoman — why neural, why TypeScript, why a staged pipeline.

#endregion
