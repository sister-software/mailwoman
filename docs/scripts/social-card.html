<!doctype html>
<meta charset="utf-8" />
<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}
	html,
	body {
		width: 1280px;
		height: 640px;
		overflow: hidden;
	}
	body {
		background: radial-gradient(1100px 700px at 20% -10%, #101c66 0%, #00093a 55%, #000524 100%);
		font-family:
			system-ui,
			-apple-system,
			"Segoe UI",
			Roboto,
			sans-serif;
		color: #fff;
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.card {
		display: flex;
		align-items: center;
		gap: 64px;
		padding: 0 96px;
	}
	.seal {
		flex: none;
	}
	.name {
		font-size: 88px;
		font-weight: 800;
		letter-spacing: -2px;
		line-height: 1.05;
	}
	.tagline {
		margin-top: 18px;
		font-size: 34px;
		font-weight: 400;
		color: #c9d1f5;
		max-width: 760px;
		line-height: 1.3;
	}
	.facts {
		margin-top: 26px;
		font-size: 26px;
		color: #8a94c8;
	}
	.facts b {
		color: #ff00b0;
		font-weight: 600;
	}
	.url {
		position: fixed;
		bottom: 36px;
		right: 48px;
		font-size: 24px;
		color: #ff00b0;
		font-weight: 600;
	}
</style>
<body>
	<div class="card">
		<svg class="seal" viewBox="0 0 120 120" width="200" height="200" aria-hidden="true">
			<rect x="8" y="8" width="104" height="104" rx="18" fill="#ff00b0"></rect>
			<g fill="#ffffff">
				<rect x="30" y="36" width="60" height="12" rx="2"></rect>
				<rect x="30" y="56" width="60" height="12" rx="2"></rect>
				<rect x="54" y="56" width="12" height="28" rx="2"></rect>
			</g>
		</svg>
		<div>
			<div class="name">Mailwoman</div>
			<div class="tagline">A calibrated, retrieval&#8209;augmented postal&#8209;address parser</div>
			<div class="facts"><b>30&nbsp;MB model</b> &nbsp;·&nbsp; Node + browser &nbsp;·&nbsp; no Elasticsearch</div>
		</div>
	</div>
	<div class="url">mailwoman.sister.software</div>
</body>
